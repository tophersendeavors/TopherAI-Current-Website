    :root{
      --bg:#141219;
      --surface:rgba(255,255,255,0.035);
      --border:rgba(255,255,255,0.07);
      --border-strong:rgba(255,255,255,0.10);
      --text:#F3E9DD;
      --muted:#B3A799;
      --dim:#7A6F70;
      --indigo:#EE9A86;
      --indigo-deep:#E8826B;
      --cyan:#EFA98F;
      --emerald:#34d399;
      --amber:#fbbf24;
      --coral:#fb7185;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
      min-height: 100vh;
    }
    .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    /* Page backdrop */
    .app-bg {
      position: fixed; inset: 0; z-index: -1; overflow: hidden;
      background:
        radial-gradient(900px 600px at 8% -10%, rgba(232,130,107,0.20), transparent 60%),
        radial-gradient(900px 600px at 95% 5%, rgba(239,169,143,0.10), transparent 60%),
        radial-gradient(700px 500px at 60% 110%, rgba(210,106,82,0.08), transparent 60%),
        var(--bg);
    }
    .app-bg::after{
      content:""; position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 75%);
      opacity:.35;
    }

    /* Surfaces */
    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .glass-strong {
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
      border: 1px solid var(--border-strong);
      backdrop-filter: blur(18px);
    }
    .glass-flat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Pills / badges */
    .pill { display:inline-flex; align-items:center; gap:5px; padding:2.5px 8px; border-radius:999px; font-size:10.5px; font-weight:500; letter-spacing:.01em; line-height:1.2; }

    /* Sidebar */
    .nav-item { display:flex; align-items:center; gap:10px; padding:8px 11px; border-radius:9px; color:#B3A799; font-size:12.5px; font-weight:500; cursor:pointer; transition: all .15s ease; border:1px solid transparent; }

    /* Sidebar brand mark — animated subtle */
    .brand-mark {

    /* Pipeline */
    .pipe-col { background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.005)); border:1px solid var(--border); border-radius:14px; }

    .row-hover { transition: background .15s ease; }

    .drawer-backdrop { position:fixed; inset:0; background:rgba(4,5,12,0.55); backdrop-filter: blur(4px); z-index:60; animation: fadeIn .18s ease both; }

    .mobile-nav-backdrop { position:fixed; inset:0; background:rgba(4,5,12,0.55); z-index:50; backdrop-filter: blur(4px); animation: fadeIn .15s ease both; }
    .mobile-nav-panel { position:fixed; top:0; left:0; bottom:0; width:260px; z-index:51; background:#1A1821; border-right:1px solid rgba(255,255,255,.07); animation: slideInRight .2s cubic-bezier(.2,.7,.2,1) both; }

    /* SMS bubbles */
    .bubble-in  { background:linear-gradient(180deg, rgba(239,169,143,.10), rgba(239,169,143,.04)); border:1px solid rgba(239,169,143,.22); }

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef, Fragment } = React;

/* ─────── Supabase init (preserved) ─────── */
let db = null;
try {
  const factory = window.supabase?.createClient || window.supabaseJs?.createClient;
  if (factory) db = factory(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
} catch (e) { console.error('Supabase init error', e); }

const isConfigured = () =>
  window.SUPABASE_URL && window.SUPABASE_ANON_KEY &&
  !window.SUPABASE_URL.includes('YOUR_PROJECT') &&
  !window.SUPABASE_ANON_KEY.includes('YOUR_ANON_PUBLIC_KEY');

/* ─────── Utils ─────── */
const fmtPhone = p => {
  if (!p) return '—';
  const d = String(p).replace(/\D/g, '');
  if (d.length === 11) return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  return p;
};
const fmtAgo = s => {
  if (!s) return '—';
  const sec = (Date.now() - new Date(s)) / 1000;
  if (sec < 60) return 'just now';
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
  return `${Math.floor(sec/86400)}d ago`;
};
const fmtDate = s => !s ? '—' : new Date(s).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
const fmtDur = s => { const n=+s||0; if(!n) return ''; const m=Math.floor(n/60), x=n%60; return m?`${m}m ${x}s`:`${x}s`; };
const today = () => new Date().toDateString();
const isToday = s => s && new Date(s).toDateString() === today();
const getLeadType = r => (r.urgency || r.lead_type || '').toLowerCase();
const initials = name => {
  if (!name) return '—';
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0]?.toUpperCase()).join('');
};

const URGENCY_OPTIONS = ['hot','warm','cold','spam'];
const PIPELINE_STAGES = [
  { key:'new',            label:'New',            color:'#EE9A86' },
  { key:'contacted',      label:'Contacted',      color:'#fbbf24' },
  { key:'demo_scheduled', label:'Demo Scheduled', color:'#EFA98F' },
  { key:'closed',         label:'Closed',         color:'#34d399' },
];
const STAGE_BY_KEY = Object.fromEntries(PIPELINE_STAGES.map(s => [s.key, s]));
const fmtName = (o, fb='Lead') => (o && (o.name || o.business_name || o.full_name || o.contact_name || o.phone || o.caller_phone || o.email)) || fb;

/* ─────── Ambassador applicant statuses ─────── */
// Lifecycle stages. "Priority" is intentionally NOT here — it's a flag (see `priority` boolean),
// so an applicant can be flagged Priority at any stage.
const AMBASSADOR_STATUSES = [
  { key:'New',        color:'#EE9A86' },
  { key:'Contacted',  color:'#fbbf24' },
  { key:'Approved',   color:'#34d399' },
  { key:'Onboarded',  color:'#EFA98F' },
  { key:'Rejected',   color:'#B3A799' },
];
const AMB_STATUS_BY_KEY = Object.fromEntries(AMBASSADOR_STATUSES.map(s => [s.key, s]));
const scoreColor = n => { const v = Number(n)||0; return v >= 8 ? '#34d399' : v >= 5 ? '#fbbf24' : '#fb7185'; };
const yesNo = v => v === true ? 'Yes' : v === false ? 'No' : '—';

/* ─────── Icons (lucide-style) ─────── */
const Icon = ({ name, size=14, className='', strokeWidth=1.75 }) => {

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const signIn = async e => {
    e.preventDefault(); setLoading(true); setErr(null);
    const { error } = await db.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (error) setErr(error.message); else onLogin();
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-6 fade">
      <div className="w-full max-w-md">
        <form onSubmit={signIn} className="glass-strong rounded-2xl p-7 space-y-5">
          <div className="text-center space-y-3">
            <div className="brand-mark mx-auto" style={{ width:54, height:54, borderRadius:14 }}><span style={{ fontSize:20 }}>T</span></div>
            <div>
              <h1 className="text-lg font-semibold text-slate-100 tracking-tight">Topher AI</h1>
              <p className="text-[11px] text-slate-500 mt-0.5 uppercase tracking-widest font-medium">Lead Command Center</p>
            </div>
          </div>
          {err && <div className="text-xs text-rose-300 bg-rose-500/10 border border-rose-500/20 rounded-xl p-3 flex gap-2 items-start"><Icon name="warning" size={13}/><span>{err}</span></div>}
          <div className="space-y-2.5">
            <div>
              <label className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest block mb-1.5">Email</label>
              <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="you@company.com" required className="field"/>
            </div>
            <div>
              <label className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest block mb-1.5">Password</label>
              <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="••••••••" required className="field"/>
            </div>
          </div>
          <button disabled={loading} className="btn btn-primary w-full justify-center py-2.5 text-[13px] disabled:opacity-50">
            {loading ? <><span className="spin"><Icon name="refresh" size={13}/></span> Signing in…</> : <>Sign in <Icon name="arrow-r" size={13}/></>}
          </button>
          <p className="text-[10.5px] text-slate-600 text-center">Secure session · Supabase Auth</p>
        </form>
        <p className="text-[10.5px] text-slate-600 text-center mt-3">© Topher AI</p>
      </div>
    </div>
  );
}

/* ─────── Compact KPI strip ─────── */
function KpiStrip({ contacts, calls, sms }) {
  const stats = useMemo(() => {
    const hot = contacts.filter(c => getLeadType(c)==='hot').length;
    const booked = contacts.filter(c => c.lead_status==='demo_scheduled').length;
    const closed = contacts.filter(c => c.lead_status==='closed').length;
    const todayCalls = calls.filter(c => isToday(c.created_at||c.started_at)).length;
    const newToday = contacts.filter(c => isToday(c.created_at)).length;
    const followup = contacts.filter(c => ['new','contacted'].includes(c.lead_status||'new')).length;
    const conv = contacts.length ? Math.round((closed / contacts.length) * 100) : 0;
    const smsIn = sms.filter(s => { const t=(s.direction||s.message_type||'').toLowerCase(); return t.includes('in')||t.includes('reply')||t.includes('received'); }).length;
    return { hot, booked, todayCalls, newToday, followup, conv, smsIn };
  }, [contacts, calls, sms]);

  const items = [
    { label:'Total',           value: contacts.length,        icon:'users',    color:'#EE9A86', sub: stats.newToday>0?`+${stats.newToday} today`:'No new today' },
    { label:'Hot Leads',       value: stats.hot,              icon:'flame',    color:'#fb7185', sub: stats.hot>0?'Need action':'None right now' },
    { label:'Demo Booked',     value: stats.booked,           icon:'calendar', color:'#EFA98F', sub:'Scheduled' },
    { label:'Calls Today',     value: stats.todayCalls,       icon:'phone',    color:'#F0B6A6', sub:`${calls.length} total` },
    { label:'Inbound SMS',     value: stats.smsIn,            icon:'arrow-in', color:'#34d399', sub:`${sms.length-stats.smsIn} sent` },
    { label:'Follow-ups',      value: stats.followup,         icon:'clock',    color:'#fda4af', sub:'Awaiting touch' },
    { label:'Conversion',      value: `${stats.conv}%`,       icon:'trend-up', color:'#fbbf24', sub:'All-time' },
  ];

  return (
    <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2.5">
      {items.map((it, i) => (
        <div key={i} className="glass rounded-xl p-3 relative overflow-hidden group">
          <div className="absolute -top-6 -right-6 w-16 h-16 rounded-full opacity-50 pointer-events-none"
            style={{ background:`radial-gradient(circle, ${it.color}30, transparent 70%)` }}/>
          <div className="flex items-center justify-between mb-2 relative">
            <span className="flex items-center gap-1 text-[9.5px] font-semibold uppercase tracking-widest text-slate-500">{it.label}<Tip align="left" label={it.label} text={KPI_TIPS[it.label]}/></span>
            <span className="w-6 h-6 rounded-md flex items-center justify-center" style={{ background:`${it.color}18`, color:it.color }}>
              <Icon name={it.icon} size={11}/>
            </span>
          </div>
          <div className="font-mono text-[22px] font-semibold text-slate-100 leading-none tracking-tight relative">{it.value}</div>
          <div className="text-[10px] text-slate-500 mt-1.5 relative truncate">{it.sub}</div>
        </div>
      ))}
    </div>
  );
}

/* ─────── PRIORITY QUEUE — flagship card ─────── */
function PriorityQueue({ contacts, sms, onOpenLead, onTab }) {
  const queue = useMemo(() => {
    // Score: hot=100, warm=40, has phone+10, has email+5, untouched (status=new) +25, idle bonus
    const scored = contacts.map(c => {
      const t = getLeadType(c);
      const status = c.lead_status || 'new';
      let score = 0;
      if (t === 'hot') score += 100;
      else if (t === 'warm') score += 40;
      else if (t === 'cold') score += 10;
      if (c.phone) score += 5;
      if (c.email) score += 3;
      if (status === 'new') score += 25;
      else if (status === 'contacted') score += 10;
      else if (status === 'closed') score -= 100;
      // urgency by idle
      const idle = (Date.now() - new Date(c.created_at||0)) / 86400000;
      if (idle < 1) score += 8;
      else if (idle > 5 && status === 'new') score += 12; // stale untouched
      // reason
      let reason = 'Worth a touch';
      if (t==='hot') reason = 'Hot lead — call now';
      else if (status==='new' && t!=='spam') reason = 'Untouched new lead';
      else if (status==='contacted' && idle > 1) reason = 'Awaiting next touch';
      return { ...c, _score: score, _reason: reason };
    }).filter(c => getLeadType(c) !== 'spam' && c.lead_status !== 'closed');
    return scored.sort((a,b) => b._score - a._score).slice(0, 5);
  }, [contacts]);

  const hotCount = contacts.filter(c => getLeadType(c)==='hot').length;

  return (
    <div className="glass rounded-2xl relative overflow-hidden">
      <div className="absolute -top-24 -left-12 w-[360px] h-[280px] pointer-events-none opacity-50"
        style={{ background:'radial-gradient(ellipse, rgba(251,113,133,.20), transparent 60%)' }}/>
      <div className="absolute -top-24 right-0 w-[360px] h-[280px] pointer-events-none opacity-40"
        style={{ background:'radial-gradient(ellipse, rgba(238,154,134,.22), transparent 60%)' }}/>

      <div className="relative flex items-center justify-between px-4 py-3 border-b border-white/5">
        <div className="flex items-center gap-2.5">
          <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{ background:'rgba(251,113,133,.14)', border:'1px solid rgba(251,113,133,.30)', color:'#fda4af' }}>
            <Icon name="pin" size={13}/>
          </div>
          <div>
            <h2 className="text-[13px] font-semibold text-slate-100 leading-tight tracking-tight flex items-center gap-1.5">Priority Queue<Tip align="left" text="The 5 leads most worth attention now — ranked by urgency, how long they’ve gone untouched, and whether they’re still open."/></h2>
            <p className="text-[10.5px] text-slate-500 mt-0.5">{queue.length} lead{queue.length===1?'':'s'} need your attention right now</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          {hotCount > 0 && (
            <span className="pill" style={{ background:'rgba(251,113,133,.14)', color:'#fda4af', border:'1px solid rgba(251,113,133,.35)' }}>
              <span className="dot pulse-dot" style={{ background:'#fb7185' }}/>
              <span className="font-mono">{hotCount}</span> hot
            </span>
          )}
          <button onClick={() => onTab('leads')} className="text-[10.5px] text-slate-400 hover:text-slate-100 flex items-center gap-1">All leads <Icon name="arrow-r" size={11}/></button>
        </div>
      </div>

      {queue.length === 0 ? (
        <Empty variant="flame" title="Inbox zero" msg="Every active lead is in a good state. Beautiful."/>
      ) : (
        <div className="relative divide-y divide-white/[0.04]">
          {queue.map((c, i) => {
            const isHot = getLeadType(c) === 'hot';
            return (
              <button key={c.id} onClick={() => onOpenLead(c)}
                className="relative w-full text-left flex items-center gap-3 px-4 py-3 row-hover transition-colors group">
                {isHot && <div className="hot-strip"/>}
                <div className="flex items-center justify-center w-7 h-7 rounded-md font-mono text-[10.5px] font-semibold flex-shrink-0"
                  style={{ background:'rgba(255,255,255,.04)', border:'1px solid rgba(255,255,255,.06)', color:'#B3A799' }}>
                  {String(i+1).padStart(2,'0')}
                </div>
                <Avatar name={c.name} type={getLeadType(c)} size={34}/>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <div className="text-[13px] font-semibold text-slate-100 truncate">{fmtName(c)}</div>
                    <LeadBadge type={getLeadType(c)}/>
                    <StagePill stage={c.lead_status || 'new'}/>
                    <SourceBadge source={c.source}/>
                  </div>
                  <div className="text-[11px] text-slate-500 mt-1 flex items-center gap-2.5 flex-wrap">
                    <span className="flex items-center gap-1 truncate"><Icon name="building" size={10}/>{c.industry || c.business_name || '—'}</span>
                    {c.phone && <span className="font-mono text-slate-400 hidden sm:inline">{fmtPhone(c.phone)}</span>}
                    <span className="text-rose-300/90 font-medium hidden md:inline">{c._reason}</span>
                  </div>
                </div>
                <div className="hidden sm:flex flex-col items-end gap-1 flex-shrink-0">
                  <span className="text-[10.5px] text-slate-600 flex items-center gap-1"><Icon name="clock" size={10}/>{fmtAgo(c.created_at)}</span>
                  <div className="flex items-center gap-1">
                    {c.phone && <a href={`tel:${c.phone}`} onClick={e=>e.stopPropagation()} className="w-7 h-7 rounded-md flex items-center justify-center text-indigo-300 hover:text-white hover:bg-indigo-500/20 transition-colors" title="Call"><Icon name="phone" size={12}/></a>}
                    {c.email && <a href={`mailto:${c.email}`} onClick={e=>e.stopPropagation()} className="w-7 h-7 rounded-md flex items-center justify-center text-cyan-300 hover:text-white hover:bg-cyan-500/20 transition-colors" title="Email"><Icon name="mail" size={12}/></a>}

              </button>
            );
          })}
        </div>
      )}
    </div>
  );

/* ─────── Recent Activity rail ─────── */
function RecentActivityRail({ calls, sms }) {
  const events = useMemo(() => {
    const e = [];
    calls.slice(0, 8).forEach(c => e.push({
      kind:'call', id:c.id||c.call_id, ts:c.created_at||c.started_at,
      title: fmtPhone(c.caller_phone),
      sub: c.summary || c.call_status || 'Call',
      tone:'#EFA98F', icon:'phone',
      tag: c.call_status || 'completed', type: c.classification || c.urgency,
    }));
    sms.slice(0, 8).forEach(s => {
      const t = (s.direction || s.message_type || '').toLowerCase();
      const inbound = t.includes('in')||t.includes('reply')||t.includes('received');
      e.push({
        kind:'sms', id:s.id, ts:s.created_at||s.sent_at,
        title: fmtPhone(s.to_number||s.phone||s.from_number),
        sub: s.message || s.body || '(empty)',
        tone: inbound ? '#34d399' : '#F0B6A6',
        icon: inbound ? 'arrow-in' : 'arrow-out',
        tag: inbound ? 'inbound' : 'outbound', status: s.status,
      });
    });
    return e.sort((a,b) => new Date(b.ts||0) - new Date(a.ts||0)).slice(0, 10);
  }, [calls, sms]);

  return (
    <div className="glass rounded-2xl overflow-hidden h-full flex flex-col">
      <div className="flex items-center justify-between px-4 py-3 border-b border-white/5">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{ background:'rgba(239,169,143,.12)', border:'1px solid rgba(239,169,143,.25)', color:'#F2BCA6' }}>
            <Icon name="spark" size={13}/>
          </div>
          <div>
            <h3 className="text-[13px] font-semibold text-slate-100 tracking-tight">Live Activity</h3>
            <p className="text-[10px] text-slate-500 mt-0.5">Calls · SMS · auto-refreshing</p>
          </div>
        </div>
        <span className="flex items-center gap-1.5 text-[10px] text-emerald-300 font-medium"><span className="dot bg-emerald-400 pulse-dot"/>Live</span>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-3" style={{ maxHeight: 520 }}>
        {events.length === 0 ? (
          <Empty variant="msg" title="No activity yet" msg="Calls and SMS will stream into this rail in real-time."/>
        ) : (
          <ol className="relative space-y-0">
            {events.map((e, i) => (
              <li key={`${e.kind}-${e.id||i}`} className="relative pl-7 pb-4 last:pb-1">
                {/* timeline line */}
                {i < events.length - 1 && <span className="absolute left-[10px] top-7 bottom-0 w-px bg-white/5"/>}
                {/* dot */}
                <span className="absolute left-0 top-1 w-[22px] h-[22px] rounded-full flex items-center justify-center"
                  style={{ background:`${e.tone}18`, border:`1px solid ${e.tone}40`, color:e.tone }}>
                  <Icon name={e.icon} size={10}/>
                </span>
                <div className="flex items-center gap-2 flex-wrap mb-0.5">
                  <span className="text-[11.5px] text-slate-200 font-mono">{e.title}</span>
                  <span className="pill" style={{ background:`${e.tone}14`, color:e.tone, border:`1px solid ${e.tone}30`, padding:'1px 6px', fontSize:'9.5px' }}>{e.tag}</span>
                </div>
                <div className="text-[11px] text-slate-400 clamp-2 leading-snug">{e.sub}</div>

                      {c.email && (

                          <Icon name="mail" size={10}/><span className="truncate">{c.email}</span>
                        </a>
                      )}
                    </div>

                    <div className="flex items-center justify-between pt-1.5 border-t border-white/5 relative">
                      <span className="text-[10px] text-slate-600 flex items-center gap-1"><Icon name="clock" size={9}/>{fmtAgo(c.created_at)}</span>
                      <div className="flex gap-1">
                        {PIPELINE_STAGES.filter(s => s.key !== stage.key).slice(0, 2).map(s => (
                          <button key={s.key} onClick={(e) => move(c, s.key, e)} disabled={moving === c.id}
                            className="text-[9.5px] font-medium px-1.5 py-0.5 rounded-md transition-all disabled:opacity-50 flex items-center gap-0.5"
                            style={{ background:`${s.color}14`, color:s.color, border:`1px solid ${s.color}28` }}
                            title={`Move to ${s.label}`}>
                            <Icon name="arrow-r" size={8} strokeWidth={2.2}/>{s.label.split(' ')[0]}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

              {f.count !== undefined && <span className={`text-[9.5px] px-1.5 py-0.5 rounded-full font-mono ${filter===f.key?'bg-indigo-500/25 text-indigo-100':'bg-white/5 text-slate-500'}`}>{f.count}</span>}

/* ─────── Pipeline tab (focused) ─────── */
function PipelineTab({ contacts, loading, onUpdate, onOpenLead, search, setSearch }) {

      || (r.email||'').toLowerCase().includes(q)
      || (r.phone||'').includes(q));

    <div className="fade">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 px-4 py-3 border-b border-white/5">
        <div className="flex items-center gap-3 flex-wrap">
          {PIPELINE_STAGES.map(s => {

              <div key={s.key} className="flex items-center gap-2 px-2.5 py-1 rounded-lg glass-flat">

/* ─────── Lead Drawer ─────── */
function LeadDrawer({ lead, onClose, onUpdate, onDelete, calls=[], sms=[], settings={} }) {
  const [urgency, setUrgency] = useState(lead?.urgency || 'warm');
  const [stage, setStage] = useState(lead?.lead_status || 'new');
  const [notes, setNotes] = useState(lead?.notes || '');
  const [name, setName] = useState(lead?.name || '');
  const [business, setBusiness] = useState(lead?.business_name || '');
  const [industry, setIndustry] = useState(lead?.industry || '');
  const [service, setService] = useState(lead?.service_interest || '');
  const [email, setEmail] = useState(lead?.email || '');
  const [saving, setSaving] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deleting, setDeleting] = useState(false);

  const timeline = useMemo(() => {
    const dg = s => (String(s||'').match(/\d/g)||[]).join('');
    const key = dg(lead?.phone).slice(-10);
    if (!key) return [];
    const ev = [];
    (calls||[]).forEach(c => {
      const cand = [c.caller_phone, c.caller_number, c.phone].map(x=>dg(x).slice(-10));
      if (cand.includes(key)) ev.push({ kind:'call', at: c.started_at||c.created_at||c.ended_at,
        title: (c.is_missed||c.call_status==='missed') ? 'Missed call' : (c.call_type==='outbound'?'Outbound call':'Inbound call'),
        body: c.summary||c.inquiry||'', meta: fmtDur(c.duration_seconds||c.duration), booked: !!c.booked, rec: c.recording_url||'', color:'#EFA98F' });
    });
    (sms||[]).forEach(m => {
      const dir = (m.direction||m.message_type||m.type||'').toLowerCase();
      const inbound = dir.includes('in')||dir.includes('reply')||dir.includes('receiv');
      const cand = [m.from_number, m.to_number, m.from, m.to].map(x=>dg(x).slice(-10));
      if (cand.includes(key)) ev.push({ kind:'sms', at: m.created_at, inbound,
        title: inbound?'Inbound text':'Sent text', body: m.message||m.body||'', color: inbound?'#34d399':'#B3A799' });
    });
    return ev.filter(e=>e.at).sort((a,b)=> new Date(b.at)-new Date(a.at)).slice(0,40);
  }, [lead, calls, sms]);

  useEffect(() => {
    if (lead) { setUrgency(lead.urgency || 'warm'); setStage(lead.lead_status || 'new'); setNotes(lead.notes || '');
      setName(lead.name || ''); setBusiness(lead.business_name || ''); setIndustry(lead.industry || ''); setService(lead.service_interest || ''); setEmail(lead.email || ''); }
    setConfirmDelete(false); setDeleting(false);
  }, [lead]);

  if (!lead) return null;

  const save = async () => {
    setSaving(true);
    await onUpdate(lead.id, { urgency, lead_status: stage, notes,
      name: name.trim() || null, business_name: business.trim() || null, industry: industry.trim() || null,
      service_interest: service.trim() || null, email: email.trim() || null });
    setSaving(false);
    onClose();
  };

  const remove = async () => {
    if (!onDelete) return;
    setDeleting(true);
    await onDelete(lead.id);
    setDeleting(false);
    onClose();
  };

  return (
    <Fragment>
      <div className="drawer-backdrop" onClick={onClose}/>
      <div className="drawer-panel">
        <div className="p-4 border-b border-white/5 flex items-start justify-between gap-3">
          <div className="flex items-center gap-3 min-w-0">
            <Avatar name={lead.name} type={getLeadType(lead)} size={44}/>
            <div className="min-w-0">
              <h2 className="text-[15px] font-semibold text-slate-100 truncate tracking-tight">{fmtName(lead)}</h2>
              <p className="text-[11.5px] text-slate-500 truncate">{lead.industry || lead.business_name || 'No business'}</p>
              <div className="flex items-center gap-1.5 mt-1.5">
                <LeadBadge type={getLeadType(lead)}/>
                <StagePill stage={lead.lead_status || 'new'}/>
              </div>
            </div>
          </div>
          <button onClick={onClose} className="text-slate-500 hover:text-white p-1.5 rounded-lg hover:bg-white/5"><Icon name="close" size={17}/></button>
        </div>

        <div className="p-4 space-y-4">
          <div className="grid grid-cols-2 gap-2">
            {lead.phone && <a href={`tel:${lead.phone}`} className="btn btn-ghost justify-center"><Icon name="phone" size={13}/>Call</a>}
            {lead.email && <a href={`mailto:${lead.email}`} className="btn btn-ghost justify-center"><Icon name="mail" size={13}/>Email</a>}
          </div>

          <div className="space-y-2">
            <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500">Contact</div>
            <div className="glass-flat rounded-xl divide-y divide-white/5">
              {[
                { label:'Phone',    val: lead.phone ? <a href={`tel:${lead.phone}`} className="font-mono text-indigo-300 hover:text-indigo-200">{fmtPhone(lead.phone)}</a> : '—', icon:'phone' },
                { label:'Email',    val: lead.email ? <a href={`mailto:${lead.email}`} className="text-cyan-300 hover:text-cyan-200 break-all">{lead.email}</a> : '—', icon:'mail' },
                { label:'Industry', val: lead.industry || lead.business_name || '—', icon:'building' },
                { label:'Service',  val: lead.service_interest || '—', icon:'target' },
              ].map((row,i) => (
                <div key={i} className="px-3 py-2.5 flex items-start gap-3">
                  <div className="w-7 h-7 rounded-lg flex items-center justify-center text-slate-500 flex-shrink-0 bg-white/[0.025] border border-white/5"><Icon name={row.icon} size={12}/></div>
                  <div className="flex-1 min-w-0">
                    <div className="text-[10px] uppercase tracking-wider text-slate-500 font-medium">{row.label}</div>
                    <div className="text-[12.5px] text-slate-200 mt-0.5 break-words">{row.val}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="space-y-2">
            <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500">Edit details</div>
            <div className="space-y-2.5">
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className="text-[10px] uppercase tracking-wider text-slate-500 font-medium block mb-1.5">Name</label>
                  <input className="field" value={name} onChange={e=>setName(e.target.value)} placeholder="Contact name"/>
                </div>
                <div>
                  <label className="text-[10px] uppercase tracking-wider text-slate-500 font-medium block mb-1.5">Business</label>
                  <input className="field" value={business} onChange={e=>setBusiness(e.target.value)} placeholder="Business name"/>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className="text-[10px] uppercase tracking-wider text-slate-500 font-medium block mb-1.5">Industry</label>
                  <input className="field" list="industry-options" value={industry} onChange={e=>setIndustry(e.target.value)} placeholder="e.g. Med spa"/>
                  <datalist id="industry-options">{((settings.lists && settings.lists.industries) || ['Med spa','Legal','Real estate','Contractor','Insurance','Dental','Other']).map(o => <option key={o} value={o}/>)}</datalist>
                </div>
                <div>
                  <label className="text-[10px] uppercase tracking-wider text-slate-500 font-medium block mb-1.5">Service interest</label>
                  <input className="field" value={service} onChange={e=>setService(e.target.value)} placeholder="What they want"/>
                </div>
              </div>
              <div>
                <label className="text-[10px] uppercase tracking-wider text-slate-500 font-medium block mb-1.5">Email</label>
                <input className="field" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@business.com"/>
              </div>
            </div>
          </div>

          <div className="space-y-2">
            <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500">Update</div>
            <div className="space-y-2.5">
              <div>
                <label className="text-[10px] uppercase tracking-wider text-slate-500 font-medium block mb-1.5">Urgency</label>
                <div className="grid grid-cols-4 gap-1.5">
                  {URGENCY_OPTIONS.map(u => (
                    <button key={u} onClick={() => setUrgency(u)}
                      className={`text-[11px] py-1.5 rounded-lg capitalize border transition-all ${urgency===u
                        ? 'bg-indigo-500/15 text-indigo-200 border-indigo-400/30'
                        : 'bg-white/[0.025] text-slate-400 border-white/5 hover:text-slate-200'}`}>
                      {u}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="text-[10px] uppercase tracking-wider text-slate-500 font-medium block mb-1.5">Pipeline Stage</label>
                <select className="field" value={stage} onChange={e=>setStage(e.target.value)}>
                  {PIPELINE_STAGES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
                </select>
              </div>
              <div>
                <label className="text-[10px] uppercase tracking-wider text-slate-500 font-medium block mb-1.5">Notes</label>
                <textarea className="field" rows={3} value={notes} onChange={e=>setNotes(e.target.value)}
                  placeholder="Jot anything — e.g. spoke w/ her, deciding between us and a competitor, follow up Friday."
                  style={{ resize:"vertical", minHeight:64, lineHeight:1.5 }}/>
              </div>
            </div>
          </div>

          <div className="space-y-2">
            <div className="flex items-center justify-between">
              <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500">History</div>
              <span className="text-[10px] text-slate-600 font-mono">{timeline.length} event{timeline.length===1?'':'s'}</span>
            </div>
            {timeline.length === 0 ? (
              <div className="glass-flat rounded-xl px-3 py-4 text-[11.5px] text-slate-500 text-center">No calls or texts matched to this number yet.</div>
            ) : (
              <div className="relative pl-4">
                <div className="absolute left-[5px] top-1 bottom-1 w-px" style={{ background:"rgba(255,255,255,.08)" }}/>
                <div className="space-y-3">
                  {timeline.map((e,i) => (
                    <div key={i} className="relative">
                      <span className="absolute -left-4 top-1 w-2.5 h-2.5 rounded-full" style={{ background:e.color, boxShadow:`0 0 8px ${e.color}66`, border:"2px solid #141219" }}/>
                      <div className="flex items-center gap-2 flex-wrap">
                        <Icon name={e.kind==='call'?'phone':(e.inbound?'arrow-in':'arrow-out')} size={11}/>
                        <span className="text-[12px] font-semibold text-slate-200">{e.title}</span>
                        {e.booked && <span className="pill badge-ok" style={{ fontSize:"9px" }}>Booked</span>}
                        {e.meta && <span className="text-[10px] text-slate-500 font-mono">{e.meta}</span>}
                        <span className="text-[10px] text-slate-600 ml-auto whitespace-nowrap">{fmtDate(e.at)}</span>
                      </div>
                      {e.body && <div className="text-[11.5px] text-slate-400 mt-1 leading-snug" style={{ display:"-webkit-box", WebkitLineClamp:3, WebkitBoxOrient:"vertical", overflow:"hidden" }}>{e.body}</div>}
                      {e.rec && <a href={e.rec} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 text-[10.5px] text-indigo-300 hover:text-indigo-200 mt-1"><Icon name="play" size={10}/>Recording</a>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {lead.message && (
            <div>
              <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500 mb-2">Inbound Message</div>
              <div className="glass-flat rounded-xl p-3 text-[12.5px] text-slate-300 leading-relaxed italic">“{lead.message}”</div>
            </div>
          )}

          <div className="flex items-center gap-2 pt-1">
            <button onClick={onClose} className="btn btn-ghost flex-1 justify-center">Cancel</button>
            <button onClick={save} disabled={saving} className="btn btn-primary flex-1 justify-center disabled:opacity-50">
              {saving ? <><span className="spin"><Icon name="refresh" size={12}/></span>Saving</> : <><Icon name="check" size={12}/>Save changes</>}
            </button>
          </div>

          {onDelete && (
            <div className="pt-1">
              {!confirmDelete ? (
                <button onClick={() => setConfirmDelete(true)} className="btn btn-danger w-full justify-center">
                  <Icon name="close" size={12}/>Delete this contact
                </button>
              ) : (
                <div className="rounded-xl p-3" style={{ background:'rgba(251,113,133,.08)', border:'1px solid rgba(251,113,133,.30)' }}>
                  <div className="text-[12px] text-slate-200 mb-2.5">Permanently delete <span className="font-semibold">{fmtName(lead)}</span>? This can’t be undone.</div>
                  <div className="flex items-center gap-2">
                    <button onClick={() => setConfirmDelete(false)} disabled={deleting} className="btn btn-ghost flex-1 justify-center">Keep</button>
                    <button onClick={remove} disabled={deleting} className="btn btn-danger flex-1 justify-center disabled:opacity-50">
                      {deleting ? <><span className="spin"><Icon name="refresh" size={12}/></span>Deleting</> : <><Icon name="close" size={12}/>Yes, delete</>}
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          <div className="pt-2 border-t border-white/5 text-[10.5px] text-slate-600 flex items-center justify-between">
            <span>Added {fmtDate(lead.created_at)}</span>
            <span className="font-mono">#{String(lead.id).slice(-8)}</span>
          </div>
        </div>
      </div>
    </Fragment>
  );
}

/* ─────── Leads tab — desktop table + mobile cards ─────── */
function LeadsTab({ rows, loading, onOpenLead, search, setSearch, filter, setFilter, contacts }) {
  const counts = useMemo(() => {
    const c = (k) => contacts.filter(x => getLeadType(x) === k).length;
    const newToday = contacts.filter(x => isToday(x.created_at)).length;
    const followup = contacts.filter(x => ['new','contacted'].includes(x.lead_status||'new')).length;
    return { all: contacts.length, hot:c('hot'), warm:c('warm'), cold:c('cold'), spam:c('spam'), newToday, followup };
  }, [contacts]);

  const filters = [
    { key:'all',       label:'All',           count: counts.all },
    { key:'hot',       label:'Hot',           count: counts.hot },
    { key:'warm',      label:'Warm',          count: counts.warm },
    { key:'cold',      label:'Cold',          count: counts.cold },
    { key:'spam',      label:'Spam',          count: counts.spam },
    { key:'newToday',  label:'New today',     count: counts.newToday },
    { key:'followup',  label:'Needs follow-up', count: counts.followup },
  ];

  return (
    <div className="fade">
      <Toolbar search={search} setSearch={setSearch} filters={filters} filter={filter} setFilter={setFilter}/>

      {loading ? (
        <div>{Array.from({length:6}).map((_,i)=><SkeletonRow key={i}/>)}</div>
      ) : rows.length === 0 ? (
        <Empty variant="default" title="No leads match your filters" msg="Try clearing the search or switching to All."/>
      ) : (
        <Fragment>
          {/* Mobile cards */}
          <div className="md:hidden p-3 space-y-2">
            {rows.map(r => {
              const isHot = getLeadType(r)==='hot';
              return (

/* ─────── SMS tab ─────── */

  return (
    <div className="fade">
      <Toolbar search={search} setSearch={setSearch} placeholder="Search messages by number or text…"/>

        <div className="p-3 space-y-2">{Array.from({length:5}).map((_,i)=><div key={i} className="skel h-14 rounded-xl"/>)}</div>

        <Empty variant="msg" title="No SMS activity yet" msg="Outbound texts and inbound replies will appear in this log."/>

        <div className="p-3 space-y-2">
          {rows.map((r, i) => {
            const inbound = isInbound(r);
            const tone = inbound ? '#EFA98F' : '#F0B6A6';
            return (
              <div key={r.id||i} className={`rounded-xl p-3 flex items-start gap-3 ${inbound?'bubble-in':'bubble-out'} hover:border-white/15 transition-all`}>
                <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
                  style={{ background:`${tone}18`, border:`1px solid ${tone}30`, color:tone }}>
                  <Icon name={inbound?'arrow-in':'arrow-out'} size={13}/>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 flex-wrap mb-1">
                    <span className="pill" style={{ background:`${tone}14`, color:tone, border:`1px solid ${tone}30` }}>
                      {inbound ? 'Inbound' : 'Outbound'}
                    </span>
                    <span className="font-mono text-[11.5px] text-slate-200">{fmtPhone(r.to_number||r.phone||r.from_number)}</span>

    <span className="pill" style={{ background:`${s.color}1A`, color:s.color, border:`1px solid ${s.color}40` }}>
      <span className="dot" style={{ background:s.color }}/>{s.key}
    </span>

};

const ScorePill = ({ score }) => {
  const c = scoreColor(score);
  return (
    <span className="pill" style={{ background:`${c}1A`, color:c, border:`1px solid ${c}40`, fontFamily:"'JetBrains Mono', monospace" }}>
      {(score ?? '—')}/10
    </span>
  );
};

    ...AMBASSADOR_STATUSES.map(s => ({ key:s.key, label:s.key, count: rows.filter(r => r.status === s.key).length })),

/* ─────── Outbound Prospecting (businesses) — Phase 1 ─────── */
const PROSPECT_STAGES = [
  { key:'found',             label:'Found',             color:'#94a3b8' },
  { key:'website_analyzed',  label:'Website Analyzed',  color:'#a5b4fc' },
  { key:'qualified',         label:'Qualified',         color:'#818cf8' },
  { key:'draft_ready',       label:'Draft Ready',       color:'#fbbf24' },
  { key:'awaiting_approval', label:'Awaiting Approval', color:'#f59e0b' },
  { key:'sent',              label:'Sent',              color:'#22d3ee' },
  { key:'replied',           label:'Replied',           color:'#2dd4bf' },
  { key:'demo_booked',       label:'Demo Booked',       color:'#34d399' },
  { key:'customer',          label:'Customer',          color:'#10b981' },
];
const PROSPECT_STAGE_BY_KEY = Object.fromEntries(PROSPECT_STAGES.map(s => [s.key, s]));

// Derived from existing signals — no DB column yet. Auto-advances as WF2/WF3 (and later outreach) write data.
const deriveProspectStage = b => {
  if (b.became_customer_at) return 'customer';
  if (b.demo_booked_at)     return 'demo_booked';
  if (b.replied_at)         return 'replied';
  if (b.sent_at)            return 'sent';
  if (b.outreach_status === 'pending_approval') return 'awaiting_approval';
  if (b.outreach_status === 'draft' || b.outreach_subject) return 'draft_ready';
  if (b.qualification_score != null) return 'qualified';
  if (b.website_analyzed_at) return 'website_analyzed';
  return 'found';
};

const ProspectStagePill = ({ stage }) => {
  const s = PROSPECT_STAGE_BY_KEY[stage] || PROSPECT_STAGE_BY_KEY.found;
  return (
    <span className="pill" style={{ background:`${s.color}1a`, color:s.color, border:`1px solid ${s.color}40` }}>
      <span className="dot" style={{ background:s.color }}/>{s.label}
    </span>
  );
};

const AnalysisPill = ({ status }) => {
  const s = (status||'').toLowerCase();
  const map = {
    analyzed:          { c:'#34d399', label:'Analyzed' },
    analyzed_no_email: { c:'#fbbf24', label:'No email' },
    fetch_failed:      { c:'#fb7185', label:'Fetch failed' },
  };
  const m = map[s];
  if (!m) return <span className="text-slate-600 text-[11.5px]">—</span>;
  return <span className="pill" style={{ background:`${m.c}1a`, color:m.c, border:`1px solid ${m.c}40` }}>{m.label}</span>;
};

const ScoreCell = ({ score }) => {
  if (score == null) return <span className="pill badge-muted">Pending</span>;
  const c = score >= 70 ? '#34d399' : score >= 40 ? '#fbbf24' : '#fb7185';
  return <span className="font-mono text-[12.5px] font-semibold" style={{ color:c }}>{score}</span>;
};

const PriorityCell = ({ priority }) => {
  if (!priority) return <span className="text-slate-600 text-[11.5px]">—</span>;
  const c = priority==='High' ? '#fb7185' : priority==='Medium' ? '#fbbf24' : '#94a3b8';
  return <span className="pill" style={{ background:`${c}1a`, color:c, border:`1px solid ${c}40` }}>{priority}</span>;
};

const ProspectSection = ({ title, children }) => (
  <div className="space-y-2">
    <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500">{title}</div>

const DEFAULT_INDUSTRIES = ['HVAC','Plumbing','Electrical','Med spa','Legal','Real estate','Contractor','Insurance','Dental','Other'];

function downloadContactsCsv(contacts) {
  const cols = ['name','phone','email','business_name','industry','service_interest','source','urgency','lead_status','tags','notes','created_at'];
  const esc = v => {
    if (v === null || v === undefined) return '';
    let s = Array.isArray(v) ? v.join('; ') : String(v);
    if (/[",\n]/.test(s)) s = '"' + s.replace(/"/g,'""') + '"';
    return s;
  };
  const rows = [cols.join(',')].concat((contacts||[]).map(c => cols.map(k => esc(c[k])).join(',')));
  const blob = new Blob([rows.join('\n')], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'contacts-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

                <div key={src} className="flex items-center gap-2">
                  <span className="font-mono text-[11px] text-slate-400 w-40 truncate" title={src}>{src}</span>
                  <input className="field" value={form.lists.sourceLabels[src] || ''} onChange={e=>setSourceLabel(src, e.target.value)} placeholder="Friendly label"/>
                </div>
              ))}
            </div>
          )}
        </Field>
      </Section>

      <Section icon="users" title="Export your leads" desc="Download all your contacts as a spreadsheet (CSV). Doubles as a backup.">
        <button onClick={()=>downloadContactsCsv(contacts)} className="btn btn-ghost">
          <Icon name="arrow-out" size={13}/>Download {(contacts||[]).length} contacts (.csv)
        </button>
      </Section>

      <div className="flex items-center gap-3 sticky bottom-3">
        <button onClick={save} disabled={savingS} className="btn btn-primary justify-center disabled:opacity-50">
          {savingS ? <><span className="spin"><Icon name="refresh" size={13}/></span>Saving</> : <><Icon name="check" size={13}/>Save settings</>}
        </button>
        {saved && <span className="text-[12px] text-emerald-300 flex items-center gap-1.5"><Icon name="check" size={12}/>Saved</span>}
      </div>
    </div>
  );
}

function App() {
  const [session, setSession]       = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [tab, setTab]               = useState('overview');
  const [filter, setFilter]         = useState('all');
  const [search, setSearch]         = useState('');
  const [loading, setLoading]       = useState(true);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [spinning, setSpinning]     = useState(false);
  const [contacts, setContacts]     = useState([]);
  const [calls, setCalls]           = useState([]);
  const [sms, setSms]               = useState([]);
  const [ambassadors, setAmbassadors] = useState([]);
  const [ambFilter, setAmbFilter]   = useState('all');
  const [err, setErr]               = useState(null);
  const [drawerLead, setDrawerLead] = useState(null);
  const [businesses, setBusinesses] = useState([]);
  const [drawerProspect, setDrawerProspect] = useState(null);
  const [mobileNav, setMobileNav]   = useState(false);
  const [settings, setSettings]     = useState({});

  useEffect(() => {
    if (!db || !isConfigured()) { setAuthLoading(false); return; }
    db.auth.getSession().then(({ data }) => { setSession(data.session||null); setAuthLoading(false); });
    const { data: sub } = db.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub?.subscription?.unsubscribe?.();
  }, []);

  const load = useCallback(async () => {
    if (!db || !isConfigured() || !session) { setLoading(false); return; }
    setSpinning(true);
    try {
      const smsQuery = await db.from('sms_messages').select('*').order('created_at',{ascending:false}).limit(300);
      const smsResult = smsQuery.error
        ? await db.from('admin_lead_alerts').select('*').order('created_at',{ascending:false}).limit(300)
        : smsQuery;
      const [{ data:c, error:e1 }, { data:cl, error:e2 }, { data:amb, error:e3 }, { data:biz, error:e4 }] = await Promise.all([
        db.from('contacts').select('*').order('created_at',{ascending:false}).limit(500),
        db.from('calls').select('*').order('created_at',{ascending:false}).limit(300),
        db.from('ambassador_applicants').select('*').order('created_at',{ascending:false}).limit(500),
        db.from('businesses').select('*').order('created_at',{ascending:false}).limit(500),
      ]);
      const firstErr = e1||e2||smsResult.error;
      if (firstErr) setErr(firstErr.message);
      else {
        setContacts(c||[]); setCalls(cl||[]); setSms(smsResult.data||[]);
        setAmbassadors(amb||[]);   // e3 (ambassador table) is non-fatal — table may not exist yet
        setBusinesses(biz||[]);    // e4 (businesses) non-fatal too
        try {
          const { data: st } = await db.from('app_settings').select('data').eq('id',1).maybeSingle();
          const s = (st && st.data) || {};
          setSettings(s);
          if (s.lists && s.lists.sourceLabels) Object.assign(SOURCE_LABELS, s.lists.sourceLabels);
        } catch(_) { /* app_settings table may not exist yet — non-fatal */ }
        setLastRefresh(new Date()); setErr(null);
      }
    } catch(e) { setErr(e.message); }
    setLoading(false); setSpinning(false);
  }, [session]);

  useEffect(() => {
    if (!session) return;
    load();
    const t = setInterval(load, 30000);
    return () => clearInterval(t);
  }, [session, load]);

  const updateContact = async (id, fields) => {
    const { error } = await db.from('contacts').update({ ...fields, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { alert('Update failed: ' + error.message); return; }
    setContacts(prev => prev.map(c => c.id === id ? { ...c, ...fields } : c));
  };

  const deleteContact = async (id) => {
    const { error } = await db.from('contacts').delete().eq('id', id);
    if (error) { alert('Delete failed: ' + error.message + '\n\nIf this mentions permissions/policy, your contacts table may need a delete policy (see notes).'); return; }
    setContacts(prev => prev.filter(c => c.id !== id));
  };

  const saveSettings = async (next) => {
    setSettings(next);
    if (next.lists && next.lists.sourceLabels) Object.assign(SOURCE_LABELS, next.lists.sourceLabels);
    const { error } = await db.from('app_settings').update({ data: next, updated_at: new Date().toISOString() }).eq('id', 1);
    if (error) alert('Settings save failed: ' + error.message + '\n\nIf this mentions table/policy, run the app_settings SQL (see notes).');
  };

  const updateAmbassador = async (id, fields) => {
    const { error } = await db.from('ambassador_applicants').update({ ...fields, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { alert('Update failed: ' + error.message); return; }
    setAmbassadors(prev => prev.map(a => a.id === id ? { ...a, ...fields } : a));
  };

  const signOut = async () => { await db.auth.signOut(); setSession(null); };

  if (!isConfigured()) return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="glass rounded-2xl p-7 max-w-md w-full space-y-4 text-center">
        <Illustration variant="default"/>
        <h2 className="text-base font-semibold text-slate-100">Configure Supabase</h2>
        <p className="text-[12.5px] text-slate-500">Update <code className="font-mono text-slate-300">SUPABASE_URL</code> and <code className="font-mono text-slate-300">SUPABASE_ANON_KEY</code> at the top of this file.</p>
      </div>
    </div>
  );

  if (authLoading) return <Spinner/>;
  if (!session) return <LoginScreen onLogin={() => db.auth.getSession().then(({ data }) => setSession(data.session))}/>;

  /* Filtering */
  const q = search.toLowerCase();
  const matchesSearch = r =>
    !q
    || (r.phone||'').includes(q)
    || (r.name||'').toLowerCase().includes(q)
    || (r.industry||'').toLowerCase().includes(q)
    || (r.email||'').toLowerCase().includes(q);

  const leadsFiltered = contacts.filter(r => {
    if (!matchesSearch(r)) return false;
    if (filter === 'all') return true;
    if (filter === 'newToday') return isToday(r.created_at);
    if (filter === 'followup') return ['new','contacted'].includes(r.lead_status||'new');
    return getLeadType(r) === filter;
  });

  const callsFiltered = calls.filter(r =>
    !q || (r.caller_phone||'').includes(q) || (r.summary||'').toLowerCase().includes(q));
  const smsFiltered = sms.filter(r =>
    !q || (r.to_number||'').includes(q) || (r.message||r.body||'').toLowerCase().includes(q));
  const ambassadorsFiltered = ambassadors.filter(r =>
    !q
    || (r.full_name||'').toLowerCase().includes(q)
    || (r.email||'').toLowerCase().includes(q)
    || (r.city||'').toLowerCase().includes(q)
    || (r.country||'').toLowerCase().includes(q)
    || (r.whatsapp||'').includes(q));

  const businessesFiltered = businesses.filter(r =>
    !q
    || (r.name||'').toLowerCase().includes(q)
    || (r.phone||'').includes(q)
    || (r.email||'').toLowerCase().includes(q)
    || (r.website||'').toLowerCase().includes(q)
    || (r.city||'').toLowerCase().includes(q)
    || (r.industry||'').toLowerCase().includes(q));

  const counts = {
    overview:   undefined,
    pipeline:   contacts.length,
    leads:      contacts.length,
    calls:      calls.length,
    sms:        sms.length,
    ambassador: ambassadors.length,
    prospecting: businesses.length,
  };

  const TAB_META = {
    overview: { title:'Command Center', subtitle:'Pipeline · Priority Queue · Live activity — your sales cockpit.' },
    pipeline: { title:'Pipeline',       subtitle:'Track every lead through new, contacted, demo and closed.' },
    leads:    { title:'Leads',          subtitle:'Every contact and inbound lead, filterable and editable.' },
    calls:    { title:'Calls',          subtitle:'AI summaries, transcripts and outcomes from every call.' },
    sms:      { title:'SMS',            subtitle:'Inbound replies and outbound message activity.' },
    ambassador:{ title:'Ambassadors',   subtitle:'Phone applicants — scored, with call recordings. Move them through the pipeline.' },
    prospecting:{ title:'Prospecting',   subtitle:'Outbound businesses sourced & analyzed by the AI engine — your cold pipeline.' },
    settings: { title:'Settings',       subtitle:'Business info, notifications, list options, and data export.' },
  };

  const meta = TAB_META[tab] || TAB_META.overview;
  const onTabChange = (k) => { setTab(k); setMobileNav(false); if (k !== 'leads') setFilter('all'); setSearch(''); };

  return (
    <div className="min-h-screen flex">
      {/* Desktop sidebar */}
      <div className="hidden lg:flex w-[238px] flex-shrink-0 sticky top-0 h-screen overflow-y-auto border-r border-white/5" style={{ background:'rgba(8,10,18,0.65)', backdropFilter:'blur(14px)' }}>
        <Sidebar tab={tab} setTab={onTabChange} counts={counts} user={session?.user} onSignOut={signOut}/>
      </div>

      {/* Mobile sidebar */}
      {mobileNav && (
        <Fragment>
          <div className="mobile-nav-backdrop" onClick={() => setMobileNav(false)}/>
          <div className="mobile-nav-panel lg:hidden">
            <Sidebar tab={tab} setTab={onTabChange} counts={counts} user={session?.user} onSignOut={signOut} onClose={() => setMobileNav(false)}/>
          </div>
        </Fragment>
      )}

      {/* Main */}
      <main className="flex-1 min-w-0">
        <div className="max-w-[1480px] mx-auto px-4 sm:px-5 lg:px-7 py-5">
          <TopBar
            title={meta.title}
            subtitle={meta.subtitle}
            lastRefresh={lastRefresh}
            onRefresh={load}
            spinning={spinning}
            onMenu={() => setMobileNav(true)}
            contacts={contacts}
          />

          {err ? (
            <ErrorPanel error={err} onRetry={load}/>
          ) : (
            <Fragment>
              {tab === 'overview' && (
                <CommandCenter contacts={contacts} calls={calls} sms={sms} businesses={businesses} loading={loading} onOpenLead={setDrawerLead} onTab={onTabChange} onUpdate={updateContact}/>
              )}

              {tab === 'pipeline' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <PipelineTab contacts={contacts} loading={loading} onUpdate={updateContact} onOpenLead={setDrawerLead} search={search} setSearch={setSearch}/>
                </div>
              )}

              {tab === 'leads' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <LeadsTab rows={leadsFiltered} loading={loading} onOpenLead={setDrawerLead} search={search} setSearch={setSearch} filter={filter} setFilter={setFilter} contacts={contacts}/>
                  <div className="border-t border-white/5 px-4 py-2.5 flex flex-wrap items-center justify-between gap-2">
                    <span className="text-[10.5px] text-slate-500"><span className="font-mono text-slate-300">{leadsFiltered.length}</span> of <span className="font-mono text-slate-300">{contacts.length}</span> contacts</span>
                    <span className="text-[10px] text-slate-600 flex items-center gap-1.5"><Icon name="refresh" size={10}/> Auto-refresh · 30s</span>
                  </div>
                </div>
              )}

              {tab === 'calls' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <CallsTab rows={callsFiltered} loading={loading} search={search} setSearch={setSearch}/>
                </div>
              )}

              {tab === 'sms' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <SMSTab rows={smsFiltered} loading={loading} search={search} setSearch={setSearch}/>
                </div>
              )}

              {tab === 'ambassador' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <AmbassadorsTab rows={ambassadorsFiltered} loading={loading} search={search} setSearch={setSearch}
                    filter={ambFilter} setFilter={setAmbFilter} onUpdate={updateAmbassador}/>
                  <div className="border-t border-white/5 px-4 py-2.5 flex flex-wrap items-center justify-between gap-2">
                    <span className="text-[10.5px] text-slate-500"><span className="font-mono text-slate-300">{ambassadorsFiltered.length}</span> of <span className="font-mono text-slate-300">{ambassadors.length}</span> applicants</span>
                    <span className="text-[10px] text-slate-600 flex items-center gap-1.5"><Icon name="refresh" size={10}/> Auto-refresh · 30s</span>
                  </div>
                </div>
              )}

              {tab === 'settings' && (
                <SettingsTab settings={settings} onSave={saveSettings} contacts={contacts}/>
              )}

              {tab === 'prospecting' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <ProspectingTab rows={businessesFiltered} loading={loading} onOpenProspect={setDrawerProspect} search={search} setSearch={setSearch}/>
                  <div className="border-t border-white/5 px-4 py-2.5 flex flex-wrap items-center justify-between gap-2">
                    <span className="text-[10.5px] text-slate-500"><span className="font-mono text-slate-300">{businessesFiltered.length}</span> of <span className="font-mono text-slate-300">{businesses.length}</span> businesses</span>
                    <span className="text-[10px] text-slate-600 flex items-center gap-1.5"><Icon name="refresh" size={10}/> Auto-refresh · 30s</span>
                  </div>
                </div>
              )}

              <div className="mt-5 flex flex-wrap items-center justify-between gap-2 px-1 text-[10.5px] text-slate-600">
                <div className="flex items-center gap-3">
                  <span className="flex items-center gap-1.5">
                    <span className="dot bg-emerald-400 pulse-dot"/>
                    Synced from Supabase
                  </span>
                  <span className="hidden sm:inline">·</span>
                  <span className="hidden sm:inline">{lastRefresh ? `Last sync ${fmtAgo(lastRefresh)}` : 'Awaiting sync'}</span>
                </div>
                <span>© Topher AI · Lead Command Center</span>
              </div>
            </Fragment>
          )}
        </div>
      </main>

      {drawerLead && <LeadDrawer lead={drawerLead} onClose={() => setDrawerLead(null)} onUpdate={updateContact} onDelete={deleteContact} calls={calls} sms={sms} settings={settings}/>}
      {drawerProspect && <ProspectDrawer prospect={drawerProspect} onClose={() => setDrawerProspect(null)}/>}
      <HelpFab/>
      <HelpModal/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
