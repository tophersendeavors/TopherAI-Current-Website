<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef, Fragment } = React;

/* ─────── Supabase init (preserved) ─────── */
let db = null;
try {
  const factory = window.supabase?.createClient || window.supabaseJs?.createClient;
  if (factory) db = factory(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
} catch (e) { console.error('Supabase init error', e); }

const isConfigured = () =>
  window.SUPABASE_URL && window.SUPABASE_ANON_KEY &&
  !window.SUPABASE_URL.includes('YOUR_PROJECT') &&
  !window.SUPABASE_ANON_KEY.includes('YOUR_ANON_PUBLIC_KEY');

/* ─────── Utils ─────── */
const fmtPhone = p => {
  if (!p) return '—';
  const d = String(p).replace(/\D/g, '');
  if (d.length === 11) return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  return p;
};
const fmtAgo = s => {
  if (!s) return '—';
  const sec = (Date.now() - new Date(s)) / 1000;
  if (sec < 60) return 'just now';
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
  return `${Math.floor(sec/86400)}d ago`;
};
const fmtDate = s => !s ? '—' : new Date(s).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
const today = () => new Date().toDateString();
const isToday = s => s && new Date(s).toDateString() === today();
const getLeadType = r => (r.urgency || r.lead_type || '').toLowerCase();
const initials = name => {
  if (!name) return '—';
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0]?.toUpperCase()).join('');
};

const URGENCY_OPTIONS = ['hot','warm','cold','spam'];
const PIPELINE_STAGES = [
  { key:'new',            label:'New',            color:'#818cf8' },
  { key:'contacted',      label:'Contacted',      color:'#fbbf24' },
  { key:'demo_scheduled', label:'Demo Scheduled', color:'#22d3ee' },
  { key:'closed',         label:'Closed',         color:'#34d399' },
];
const STAGE_BY_KEY = Object.fromEntries(PIPELINE_STAGES.map(s => [s.key, s]));

/* ─────── Ambassador applicant statuses ─────── */
// Lifecycle stages. "Priority" is intentionally NOT here — it's a flag (see `priority` boolean),
// so an applicant can be flagged Priority at any stage.
const AMBASSADOR_STATUSES = [
  { key:'New',        color:'#818cf8' },
  { key:'Contacted',  color:'#fbbf24' },
  { key:'Approved',   color:'#34d399' },
  { key:'Onboarded',  color:'#22d3ee' },
  { key:'Rejected',   color:'#94a3b8' },
];
const AMB_STATUS_BY_KEY = Object.fromEntries(AMBASSADOR_STATUSES.map(s => [s.key, s]));
const scoreColor = n => { const v = Number(n)||0; return v >= 8 ? '#34d399' : v >= 5 ? '#fbbf24' : '#fb7185'; };
const yesNo = v => v === true ? 'Yes' : v === false ? 'No' : '—';

/* ─────── Icons (lucide-style) ─────── */
const Icon = ({ name, size=14, className='', strokeWidth=1.75 }) => {
  const p = { width:size, height:size, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth, strokeLinecap:'round', strokeLinejoin:'round', className };
  switch(name){
    case 'spark':    return <svg {...p}><path d="M12 3v3M12 18v3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M3 12h3M18 12h3M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>;
    case 'home':     return <svg {...p}><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>;
    case 'kanban':   return <svg {...p}><rect x="3" y="4" width="5" height="13" rx="1.5"/><rect x="10" y="4" width="5" height="9" rx="1.5"/><rect x="17" y="4" width="4" height="16" rx="1.5"/></svg>;
    case 'users':    return <svg {...p}><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.4 2.7-5.5 6-5.5s6 2.1 6 5.5"/><path d="M16 4.3a3.2 3.2 0 0 1 0 6"/><path d="M20.5 20c0-3-2-4.6-4.5-5.2"/></svg>;
    case 'phone':    return <svg {...p}><path d="M5 4h3l2 5-2.5 1.5a11 11 0 0 0 6 6L15 14l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>;
    case 'phone-in': return <svg {...p}><path d="M5 4h3l2 5-2.5 1.5a11 11 0 0 0 6 6L15 14l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/><polyline points="17 8 21 4 21 8 17 8" transform="translate(-2 1)"/></svg>;
    case 'msg':      return <svg {...p}><path d="M21 12a8 8 0 0 1-11.6 7.2L4 21l1.8-5.2A8 8 0 1 1 21 12z"/></svg>;

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const signIn = async e => {
    e.preventDefault(); setLoading(true); setErr(null);
    const { error } = await db.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (error) setErr(error.message); else onLogin();
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-6 fade">
      <div className="w-full max-w-md">
        <form onSubmit={signIn} className="glass-strong rounded-2xl p-7 space-y-5">
          <div className="text-center space-y-3">
            <div className="brand-mark mx-auto" style={{ width:54, height:54, borderRadius:14 }}><span style={{ fontSize:20 }}>T</span></div>
            <div>
              <h1 className="text-lg font-semibold text-slate-100 tracking-tight">Topher AI</h1>
              <p className="text-[11px] text-slate-500 mt-0.5 uppercase tracking-widest font-medium">Lead Command Center</p>
            </div>
          </div>
          {err && <div className="text-xs text-rose-300 bg-rose-500/10 border border-rose-500/20 rounded-xl p-3 flex gap-2 items-start"><Icon name="warning" size={13}/><span>{err}</span></div>}
          <div className="space-y-2.5">
            <div>
              <label className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest block mb-1.5">Email</label>
              <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="you@company.com" required className="field"/>
            </div>
            <div>
              <label className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest block mb-1.5">Password</label>
              <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="••••••••" required className="field"/>
            </div>
          </div>
          <button disabled={loading} className="btn btn-primary w-full justify-center py-2.5 text-[13px] disabled:opacity-50">
            {loading ? <><span className="spin"><Icon name="refresh" size={13}/></span> Signing in…</> : <>Sign in <Icon name="arrow-r" size={13}/></>}
          </button>
          <p className="text-[10.5px] text-slate-600 text-center">Secure session · Supabase Auth</p>
        </form>
        <p className="text-[10.5px] text-slate-600 text-center mt-3">© Topher AI</p>
      </div>
    </div>
  );
}

/* ─────── Compact KPI strip ─────── */
function KpiStrip({ contacts, calls, sms }) {
  const stats = useMemo(() => {
    const hot = contacts.filter(c => getLeadType(c)==='hot').length;
    const booked = contacts.filter(c => c.lead_status==='demo_scheduled').length;
    const closed = contacts.filter(c => c.lead_status==='closed').length;
    const todayCalls = calls.filter(c => isToday(c.created_at||c.started_at)).length;
    const newToday = contacts.filter(c => isToday(c.created_at)).length;
    const followup = contacts.filter(c => ['new','contacted'].includes(c.lead_status||'new')).length;
    const conv = contacts.length ? Math.round((closed / contacts.length) * 100) : 0;
    const smsIn = sms.filter(s => { const t=(s.direction||s.message_type||'').toLowerCase(); return t.includes('in')||t.includes('reply')||t.includes('received'); }).length;
    return { hot, booked, todayCalls, newToday, followup, conv, smsIn };
  }, [contacts, calls, sms]);

  const items = [
    { label:'Total',           value: contacts.length,        icon:'users',    color:'#818cf8', sub: stats.newToday>0?`+${stats.newToday} today`:'No new today' },
    { label:'Hot Leads',       value: stats.hot,              icon:'flame',    color:'#fb7185', sub: stats.hot>0?'Need action':'None right now' },
    { label:'Demo Booked',     value: stats.booked,           icon:'calendar', color:'#22d3ee', sub:'Scheduled' },
    { label:'Calls Today',     value: stats.todayCalls,       icon:'phone',    color:'#a5b4fc', sub:`${calls.length} total` },
    { label:'Inbound SMS',     value: stats.smsIn,            icon:'arrow-in', color:'#34d399', sub:`${sms.length-stats.smsIn} sent` },
    { label:'Follow-ups',      value: stats.followup,         icon:'clock',    color:'#fda4af', sub:'Awaiting touch' },
    { label:'Conversion',      value: `${stats.conv}%`,       icon:'trend-up', color:'#fbbf24', sub:'All-time' },
  ];

  return (
    <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2.5">
      {items.map((it, i) => (
        <div key={i} className="glass rounded-xl p-3 relative overflow-hidden group">
          <div className="absolute -top-6 -right-6 w-16 h-16 rounded-full opacity-50 pointer-events-none"
            style={{ background:`radial-gradient(circle, ${it.color}30, transparent 70%)` }}/>
          <div className="flex items-center justify-between mb-2 relative">
            <span className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500">{it.label}</span>
            <span className="w-6 h-6 rounded-md flex items-center justify-center" style={{ background:`${it.color}18`, color:it.color }}>
              <Icon name={it.icon} size={11}/>
            </span>
          </div>

/* ─────── PRIORITY QUEUE — flagship card ─────── */
function PriorityQueue({ contacts, sms, onOpenLead, onTab }) {
  const queue = useMemo(() => {
    // Score: hot=100, warm=40, has phone+10, has email+5, untouched (status=new) +25, idle bonus
    const scored = contacts.map(c => {
      const t = getLeadType(c);
      const status = c.lead_status || 'new';
      let score = 0;
      if (t === 'hot') score += 100;
      else if (t === 'warm') score += 40;
      else if (t === 'cold') score += 10;
      if (c.phone) score += 5;
      if (c.email) score += 3;
      if (status === 'new') score += 25;
      else if (status === 'contacted') score += 10;
      else if (status === 'closed') score -= 100;
      // urgency by idle
      const idle = (Date.now() - new Date(c.created_at||0)) / 86400000;
      if (idle < 1) score += 8;
      else if (idle > 5 && status === 'new') score += 12; // stale untouched
      // reason
      let reason = 'Worth a touch';
      if (t==='hot') reason = 'Hot lead — call now';
      else if (status==='new' && t!=='spam') reason = 'Untouched new lead';
      else if (status==='contacted' && idle > 1) reason = 'Awaiting next touch';
      return { ...c, _score: score, _reason: reason };
    }).filter(c => getLeadType(c) !== 'spam' && c.lead_status !== 'closed');
    return scored.sort((a,b) => b._score - a._score).slice(0, 5);
  }, [contacts]);

  const hotCount = contacts.filter(c => getLeadType(c)==='hot').length;

  return (
    <div className="glass rounded-2xl relative overflow-hidden">
      <div className="absolute -top-24 -left-12 w-[360px] h-[280px] pointer-events-none opacity-50"
        style={{ background:'radial-gradient(ellipse, rgba(251,113,133,.20), transparent 60%)' }}/>
      <div className="absolute -top-24 right-0 w-[360px] h-[280px] pointer-events-none opacity-40"
        style={{ background:'radial-gradient(ellipse, rgba(129,140,248,.22), transparent 60%)' }}/>

      <div className="relative flex items-center justify-between px-4 py-3 border-b border-white/5">
        <div className="flex items-center gap-2.5">
          <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{ background:'rgba(251,113,133,.14)', border:'1px solid rgba(251,113,133,.30)', color:'#fda4af' }}>
            <Icon name="pin" size={13}/>
          </div>
          <div>
            <h2 className="text-[13px] font-semibold text-slate-100 leading-tight tracking-tight">Priority Queue</h2>
            <p className="text-[10.5px] text-slate-500 mt-0.5">{queue.length} lead{queue.length===1?'':'s'} need your attention right now</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          {hotCount > 0 && (
            <span className="pill" style={{ background:'rgba(251,113,133,.14)', color:'#fda4af', border:'1px solid rgba(251,113,133,.35)' }}>
              <span className="dot pulse-dot" style={{ background:'#fb7185' }}/>
              <span className="font-mono">{hotCount}</span> hot
            </span>
          )}
          <button onClick={() => onTab('leads')} className="text-[10.5px] text-slate-400 hover:text-slate-100 flex items-center gap-1">All leads <Icon name="arrow-r" size={11}/></button>
        </div>
      </div>

      {queue.length === 0 ? (
        <Empty variant="flame" title="Inbox zero" msg="Every active lead is in a good state. Beautiful."/>
      ) : (
        <div className="relative divide-y divide-white/[0.04]">
          {queue.map((c, i) => {
            const isHot = getLeadType(c) === 'hot';
            return (
              <button key={c.id} onClick={() => onOpenLead(c)}
                className="relative w-full text-left flex items-center gap-3 px-4 py-3 row-hover transition-colors group">
                {isHot && <div className="hot-strip"/>}
                <div className="flex items-center justify-center w-7 h-7 rounded-md font-mono text-[10.5px] font-semibold flex-shrink-0"
                  style={{ background:'rgba(255,255,255,.04)', border:'1px solid rgba(255,255,255,.06)', color:'#94a3b8' }}>
                  {String(i+1).padStart(2,'0')}
                </div>
                <Avatar name={c.name} type={getLeadType(c)} size={34}/>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <div className="text-[13px] font-semibold text-slate-100 truncate">{c.name || 'Unnamed lead'}</div>
                    <LeadBadge type={getLeadType(c)}/>
                    <StagePill stage={c.lead_status || 'new'}/>
                  </div>
                  <div className="text-[11px] text-slate-500 mt-1 flex items-center gap-2.5 flex-wrap">
                    <span className="flex items-center gap-1 truncate"><Icon name="building" size={10}/>{c.industry || c.business_name || '—'}</span>
                    {c.phone && <span className="font-mono text-slate-400 hidden sm:inline">{fmtPhone(c.phone)}</span>}
                    <span className="text-rose-300/90 font-medium hidden md:inline">{c._reason}</span>
                  </div>
                </div>
                <div className="hidden sm:flex flex-col items-end gap-1 flex-shrink-0">
                  <span className="text-[10.5px] text-slate-600 flex items-center gap-1"><Icon name="clock" size={10}/>{fmtAgo(c.created_at)}</span>
                  <div className="flex items-center gap-1">

/* ─────── Recent Activity rail ─────── */
function RecentActivityRail({ calls, sms }) {
  const events = useMemo(() => {
    const e = [];
    calls.slice(0, 8).forEach(c => e.push({
      kind:'call', id:c.id||c.call_id, ts:c.created_at||c.started_at,
      title: fmtPhone(c.caller_phone),
      sub: c.summary || c.call_status || 'Call',
      tone:'#22d3ee', icon:'phone',
      tag: c.call_status || 'completed', type: c.classification || c.urgency,
    }));
    sms.slice(0, 8).forEach(s => {
      const t = (s.direction || s.message_type || '').toLowerCase();
      const inbound = t.includes('in')||t.includes('reply')||t.includes('received');
      e.push({
        kind:'sms', id:s.id, ts:s.created_at||s.sent_at,
        title: fmtPhone(s.to_number||s.phone||s.from_number),
        sub: s.message || s.body || '(empty)',
        tone: inbound ? '#34d399' : '#a5b4fc',
        icon: inbound ? 'arrow-in' : 'arrow-out',
        tag: inbound ? 'inbound' : 'outbound', status: s.status,
      });
    });
    return e.sort((a,b) => new Date(b.ts||0) - new Date(a.ts||0)).slice(0, 10);
  }, [calls, sms]);

  return (
    <div className="glass rounded-2xl overflow-hidden h-full flex flex-col">
      <div className="flex items-center justify-between px-4 py-3 border-b border-white/5">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{ background:'rgba(34,211,238,.12)', border:'1px solid rgba(34,211,238,.25)', color:'#67e8f9' }}>
            <Icon name="spark" size={13}/>
          </div>
          <div>
            <h3 className="text-[13px] font-semibold text-slate-100 tracking-tight">Live Activity</h3>
            <p className="text-[10px] text-slate-500 mt-0.5">Calls · SMS · auto-refreshing</p>
          </div>
        </div>
        <span className="flex items-center gap-1.5 text-[10px] text-emerald-300 font-medium"><span className="dot bg-emerald-400 pulse-dot"/>Live</span>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-3" style={{ maxHeight: 520 }}>
        {events.length === 0 ? (
          <Empty variant="msg" title="No activity yet" msg="Calls and SMS will stream into this rail in real-time."/>
        ) : (
          <ol className="relative space-y-0">
            {events.map((e, i) => (
              <li key={`${e.kind}-${e.id||i}`} className="relative pl-7 pb-4 last:pb-1">
                {/* timeline line */}
                {i < events.length - 1 && <span className="absolute left-[10px] top-7 bottom-0 w-px bg-white/5"/>}
                {/* dot */}
                <span className="absolute left-0 top-1 w-[22px] h-[22px] rounded-full flex items-center justify-center"
                  style={{ background:`${e.tone}18`, border:`1px solid ${e.tone}40`, color:e.tone }}>
                  <Icon name={e.icon} size={10}/>
                </span>
                <div className="flex items-center gap-2 flex-wrap mb-0.5">
                  <span className="text-[11.5px] text-slate-200 font-mono">{e.title}</span>
                  <span className="pill" style={{ background:`${e.tone}14`, color:e.tone, border:`1px solid ${e.tone}30`, padding:'1px 6px', fontSize:'9.5px' }}>{e.tag}</span>
                </div>
                <div className="text-[11px] text-slate-400 clamp-2 leading-snug">{e.sub}</div>
                <div className="text-[10px] text-slate-600 mt-0.5">{fmtAgo(e.ts)}</div>
              </li>
            ))}
          </ol>
        )}
      </div>
    </div>
  );
}

/* ─────── Lead Drawer ─────── */
function LeadDrawer({ lead, onClose, onUpdate }) {
  const [urgency, setUrgency] = useState(lead?.urgency || 'warm');
  const [stage, setStage] = useState(lead?.lead_status || 'new');
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (lead) { setUrgency(lead.urgency || 'warm'); setStage(lead.lead_status || 'new'); }
  }, [lead]);

  if (!lead) return null;

  const save = async () => {
    setSaving(true);
    await onUpdate(lead.id, { urgency, lead_status: stage });
    setSaving(false);
    onClose();
  };

  return (
    <Fragment>
      <div className="drawer-backdrop" onClick={onClose}/>
      <div className="drawer-panel">
        <div className="p-4 border-b border-white/5 flex items-start justify-between gap-3">
          <div className="flex items-center gap-3 min-w-0">
            <Avatar name={lead.name} type={getLeadType(lead)} size={44}/>
            <div className="min-w-0">

/* ─────── Leads tab — desktop table + mobile cards ─────── */
function LeadsTab({ rows, loading, onOpenLead, search, setSearch, filter, setFilter, contacts }) {
  const counts = useMemo(() => {
    const c = (k) => contacts.filter(x => getLeadType(x) === k).length;
    const newToday = contacts.filter(x => isToday(x.created_at)).length;
    const followup = contacts.filter(x => ['new','contacted'].includes(x.lead_status||'new')).length;
    return { all: contacts.length, hot:c('hot'), warm:c('warm'), cold:c('cold'), spam:c('spam'), newToday, followup };
  }, [contacts]);

  const filters = [
    { key:'all',       label:'All',           count: counts.all },
    { key:'hot',       label:'Hot',           count: counts.hot },
    { key:'warm',      label:'Warm',          count: counts.warm },
    { key:'cold',      label:'Cold',          count: counts.cold },
    { key:'spam',      label:'Spam',          count: counts.spam },
    { key:'newToday',  label:'New today',     count: counts.newToday },
    { key:'followup',  label:'Needs follow-up', count: counts.followup },
  ];

  return (
    <div className="fade">
      <Toolbar search={search} setSearch={setSearch} filters={filters} filter={filter} setFilter={setFilter}/>

      {loading ? (
        <div>{Array.from({length:6}).map((_,i)=><SkeletonRow key={i}/>)}</div>
      ) : rows.length === 0 ? (
        <Empty variant="default" title="No leads match your filters" msg="Try clearing the search or switching to All."/>
      ) : (
        <Fragment>
          {/* Mobile cards */}
          <div className="md:hidden p-3 space-y-2">
            {rows.map(r => {
              const isHot = getLeadType(r)==='hot';
              return (
                <button key={r.id} onClick={() => onOpenLead(r)} className={`relative lead-card w-full text-left p-3 ${isHot?'hot hot-aura':''}`}>
                  {isHot && <div className="hot-strip"/>}
                  <div className="flex items-start gap-3">
                    <Avatar name={r.name} type={getLeadType(r)} size={36}/>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between gap-2 mb-1">
                        <div className="text-[13px] font-semibold text-slate-100 truncate">{r.name || 'Unnamed'}</div>
                        <LeadBadge type={getLeadType(r)}/>
                      </div>
                      <div className="text-[11px] text-slate-500 truncate">{r.industry || r.business_name || '—'}</div>
                      <div className="flex items-center gap-2 mt-2 flex-wrap">
                        <StagePill stage={r.lead_status||'new'}/>
                        <span className="text-[10.5px] text-slate-600">{fmtAgo(r.created_at)}</span>
                      </div>
                      <div className="flex items-center gap-3 mt-2 pt-2 border-t border-white/5 text-[11px]">
                        {r.phone && <a href={`tel:${r.phone}`} onClick={e=>e.stopPropagation()} className="font-mono text-indigo-300 flex items-center gap-1"><Icon name="phone" size={11}/>{fmtPhone(r.phone)}</a>}
                        {r.email && <a href={`mailto:${r.email}`} onClick={e=>e.stopPropagation()} className="text-cyan-300 flex items-center gap-1 truncate"><Icon name="mail" size={11}/><span className="truncate">{r.email}</span></a>}
                      </div>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>

          {/* Desktop table */}
          <div className="hidden md:block overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="sticky top-0 z-10" style={{ background:'rgba(8,10,18,0.85)', backdropFilter:'blur(10px)' }}>
                <tr className="border-b border-white/5 text-left text-[10px] text-slate-500 uppercase tracking-widest">
                  <th className="px-4 py-2.5 font-semibold">Lead</th>
                  <th className="px-4 py-2.5 font-semibold">Phone</th>
                  <th className="px-4 py-2.5 font-semibold hidden lg:table-cell">Email</th>
                  <th className="px-4 py-2.5 font-semibold hidden xl:table-cell">Industry</th>
                  <th className="px-4 py-2.5 font-semibold">Urgency</th>
                  <th className="px-4 py-2.5 font-semibold">Stage</th>
                  <th className="px-4 py-2.5 font-semibold">Added</th>
                  <th className="px-4 py-2.5 font-semibold w-8"></th>
                </tr>
              </thead>
              <tbody className="divide-y divide-white/[0.04]">
                {rows.map(r => {
                  const isHot = getLeadType(r) === 'hot';
                  return (
                    <tr key={r.id}
                      className={`row-hover transition-colors cursor-pointer relative ${isHot?'bg-rose-500/[0.04]':''}`}
                      style={isHot ? { boxShadow: 'inset 2px 0 0 #fb7185' } : {}}
                      onClick={() => onOpenLead(r)}>
                      <td className="px-4 py-3">
                        <div className="flex items-center gap-2.5 min-w-0">
                          <Avatar name={r.name} type={getLeadType(r)} size={30}/>
                          <div className="min-w-0">
                            <div className="text-[12.5px] font-medium text-slate-100 truncate">{r.name || <span className="text-slate-600">Unnamed</span>}</div>
                          </div>
                        </div>
                      </td>
                      <td className="px-4 py-3" onClick={e=>e.stopPropagation()}>
                        {r.phone
                          ? <a href={`tel:${r.phone}`} className="font-mono text-[11.5px] text-indigo-300 hover:text-indigo-200">{fmtPhone(r.phone)}</a>
                          : <span className="text-slate-600 text-[11.5px]">—</span>}
                      </td>
                      <td className="px-4 py-3 hidden lg:table-cell" onClick={e=>e.stopPropagation()}>
                        {r.email
                          ? <a href={`mailto:${r.email}`} className="text-cyan-300 text-[11.5px] hover:text-cyan-200 truncate max-w-[200px] block">{r.email}</a>
                          : <span className="text-slate-600 text-[11.5px]">—</span>}
                      </td>
                      <td className="px-4 py-3 text-slate-400 text-[11.5px] hidden xl:table-cell">{r.industry || r.business_name || '—'}</td>
                      <td className="px-4 py-3"><LeadBadge type={getLeadType(r)}/></td>
                      <td className="px-4 py-3"><StagePill stage={r.lead_status || 'new'}/></td>
                      <td className="px-4 py-3 text-slate-500 text-[11px]">{fmtAgo(r.created_at || r.updated_at)}</td>
                      <td className="px-4 py-3 text-slate-600"><Icon name="chevron-r" size={13}/></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Fragment>
      )}
    </div>
  );
}

/* ─────── Calls tab ─────── */
function CallsTab({ rows, loading, search, setSearch }) {

  return (
    <div className="fade">
      <Toolbar search={search} setSearch={setSearch} placeholder="Search calls by phone or summary…"/>
      {loading ? (
        <div className="p-3 space-y-2.5">{Array.from({length:4}).map((_,i)=><div key={i} className="skel h-16 rounded-2xl"/>)}</div>
      ) : rows.length === 0 ? (
        <Empty variant="phone" title="No call activity yet" msg="Once your AI receptionist picks up a call, the transcript and summary will appear here."/>
      ) : (
        <div className="p-3 space-y-2">
          {rows.map((r, i) => {
            const id = r.id || r.call_id || i;
            const isOpen = open === id;

              <div key={id} className="glass rounded-xl overflow-hidden">
                <button onClick={() => setOpen(isOpen ? null : id)} className="w-full text-left p-3 flex items-center gap-3 row-hover">

                    style={{ background:`${tone}18`, border:`1px solid ${tone}30`, color:tone }}>
                    <Icon name="phone" size={14}/>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1.5 flex-wrap">
                      <span className="font-mono text-[12.5px] text-slate-100">{fmtPhone(r.caller_phone)}</span>
                      <span className="pill" style={{ background:`${tone}14`, color:tone, border:`1px solid ${tone}30` }}>
                        <span className="dot" style={{ background:tone }}/>{r.call_status || 'completed'}
                      </span>
                      {(r.classification || r.urgency || r.lead_type) && <LeadBadge type={r.classification||r.urgency||r.lead_type}/>}

                  <div className="text-right hidden sm:block flex-shrink-0">
                    <div className="text-[11px] text-slate-400">{fmtAgo(r.created_at||r.started_at)}</div>
                    <div className="text-[9.5px] text-slate-600 mt-0.5">{fmtDate(r.created_at||r.started_at)}</div>
                  </div>
                  <Icon name={isOpen?'chevron-d':'chevron-r'} size={14} className="text-slate-500 flex-shrink-0"/>
                </button>
                {isOpen && (
                  <div className="px-3 pb-3 fade space-y-3 border-t border-white/5 pt-3">
                    {r.summary && (
                      <div>
                        <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500 mb-1.5 flex items-center gap-1.5"><Icon name="spark" size={10} strokeWidth={2.2}/> AI Summary</div>
                        <p className="text-[12.5px] text-slate-200 leading-relaxed">{r.summary}</p>
                      </div>
                    )}
                    {r.transcript && (
                      <div>
                        <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500 mb-1.5 flex items-center gap-1.5"><Icon name="mic" size={10} strokeWidth={2.2}/> Transcript</div>
                        <div className="bg-black/30 border border-white/5 rounded-lg p-3 max-h-60 overflow-y-auto">
                          <pre className="text-[11.5px] text-slate-300 whitespace-pre-wrap font-mono leading-relaxed">{r.transcript}</pre>
                        </div>
                      </div>
                    )}
                    <div className="flex items-center justify-between flex-wrap gap-2 text-[10.5px] text-slate-600 pt-1">
                      <span className="font-mono">Call ID · {r.call_id || r.id}</span>
                      {r.recording_url && (
                        <a href={r.recording_url} target="_blank" rel="noreferrer" className="btn btn-ghost"><Icon name="play" size={11}/>Open recording</a>

/* ─────── SMS tab ─────── */
function SMSTab({ rows, loading, search, setSearch }) {
  const isInbound = r => {
    const t = (r.direction || r.message_type || '').toLowerCase();
    return t.includes('in') || t.includes('reply') || t.includes('received');
  };

  return (
    <div className="fade">
      <Toolbar search={search} setSearch={setSearch} placeholder="Search messages by number or text…"/>
      {loading ? (
        <div className="p-3 space-y-2">{Array.from({length:5}).map((_,i)=><div key={i} className="skel h-14 rounded-xl"/>)}</div>
      ) : rows.length === 0 ? (
        <Empty variant="msg" title="No SMS activity yet" msg="Outbound texts and inbound replies will appear in this log."/>
      ) : (
        <div className="p-3 space-y-2">
          {rows.map((r, i) => {
            const inbound = isInbound(r);
            const tone = inbound ? '#22d3ee' : '#a5b4fc';
            return (
              <div key={r.id||i} className={`rounded-xl p-3 flex items-start gap-3 ${inbound?'bubble-in':'bubble-out'} hover:border-white/15 transition-all`}>
                <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
                  style={{ background:`${tone}18`, border:`1px solid ${tone}30`, color:tone }}>
                  <Icon name={inbound?'arrow-in':'arrow-out'} size={13}/>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 flex-wrap mb-1">
                    <span className="pill" style={{ background:`${tone}14`, color:tone, border:`1px solid ${tone}30` }}>
                      {inbound ? 'Inbound' : 'Outbound'}
                    </span>
                    <span className="font-mono text-[11.5px] text-slate-200">{fmtPhone(r.to_number||r.phone||r.from_number)}</span>
                    <StatusBadge status={r.status}/>
                    {r.message_type && <span className="pill badge-muted">{(r.message_type).replace(/_/g,' ')}</span>}
                    <span className="text-[10px] text-slate-600 ml-auto">{fmtAgo(r.created_at||r.sent_at)}</span>
                  </div>
                  <p className="text-[12.5px] text-slate-200 leading-snug">{r.message || r.body || <span className="text-slate-600 italic">(empty)</span>}</p>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─────── Ambassadors tab — applicant intake pipeline ─────── */
const AmbStatusPill = ({ status }) => {
  const s = AMB_STATUS_BY_KEY[status] || AMB_STATUS_BY_KEY.New;
  return (
    <span className="pill" style={{ background:`${s.color}1A`, color:s.color, border:`1px solid ${s.color}40` }}>
      <span className="dot" style={{ background:s.color }}/>{s.key}
    </span>
  );
};

const ScorePill = ({ score }) => {
  const c = scoreColor(score);
  return (
    <span className="pill" style={{ background:`${c}1A`, color:c, border:`1px solid ${c}40`, fontFamily:"'JetBrains Mono', monospace" }}>
      {(score ?? '—')}/10
    </span>
  );
};

function AmbassadorsTab({ rows, loading, search, setSearch, filter, setFilter, onUpdate }) {
  const [open, setOpen] = useState(null);

  const filters = [
    { key:'all',      label:'All',       count: rows.length },
    { key:'priority', label:'Priority',  count: rows.filter(r => r.priority || (Number(r.applicant_score)||0) >= 8).length },
    ...AMBASSADOR_STATUSES.map(s => ({ key:s.key, label:s.key, count: rows.filter(r => r.status === s.key).length })),
  ];

  const visible = rows.filter(r => {
    if (filter === 'priority') return r.priority || (Number(r.applicant_score)||0) >= 8;
    if (filter !== 'all') return r.status === filter;
    return true;
  });

  return (
    <div className="fade">
      <Toolbar search={search} setSearch={setSearch} filters={filters} filter={filter} setFilter={setFilter}
        placeholder="Search applicants by name, location, email…"/>
      {loading ? (
        <div className="p-3 space-y-2.5">{Array.from({length:4}).map((_,i)=><div key={i} className="skel h-16 rounded-2xl"/>)}</div>
      ) : visible.length === 0 ? (
        <Empty variant="users" title="No ambassador applicants yet" msg="When someone applies by phone, their profile, score and call recording will appear here automatically."/>
      ) : (
        <div className="p-3 space-y-2">
          {visible.map((r, i) => {
            const id = r.id || i;
            const isOpen = open === id;
            const sc = scoreColor(r.applicant_score);
            const isPriority = r.priority || (Number(r.applicant_score)||0) >= 8;
            return (
              <div key={id} className="glass rounded-xl overflow-hidden">
                <button onClick={() => setOpen(isOpen ? null : id)} className="w-full text-left p-3 flex items-center gap-3 row-hover">
                  <div className="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 font-semibold text-[12px]"
                    style={{ background:`${sc}18`, border:`1px solid ${sc}30`, color:sc }}>
                    {initials(r.full_name)}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1.5 flex-wrap">
                      <span className="text-[13px] font-medium text-slate-100">{r.full_name || '—'}</span>
                      {isPriority && <span className="pill badge-hot"><Icon name="flame" size={10} strokeWidth={2.1}/>Priority</span>}
                      <AmbStatusPill status={r.status}/>
                      {(r.followup_count > 0) && <span className="pill badge-indigo"><Icon name="refresh" size={10} strokeWidth={2.1}/>{r.followup_count}× follow-up</span>}
                    </div>
                    <div className="text-[11.5px] text-slate-400 mt-1 clamp-1">
                      {[r.city, r.country].filter(Boolean).join(', ') || '—'}
                      {r.english_level ? ` · ${r.english_level} English` : ''}
                      {r.hours_per_day ? ` · ${r.hours_per_day} hrs/day` : ''}
                    </div>
                  </div>
                  <div className="hidden sm:block flex-shrink-0"><ScorePill score={r.applicant_score}/></div>
                  <div className="text-right hidden md:block flex-shrink-0">
                    <div className="text-[11px] text-slate-400">{fmtAgo(r.created_at)}</div>
                    <div className="text-[9.5px] text-slate-600 mt-0.5">{fmtDate(r.created_at)}</div>
                  </div>
                  <Icon name={isOpen?'chevron-d':'chevron-r'} size={14} className="text-slate-500 flex-shrink-0"/>
                </button>

                {isOpen && (
                  <div className="px-3 pb-3 fade space-y-3 border-t border-white/5 pt-3">
                    {/* Controls */}
                    <div className="flex flex-wrap items-center gap-2">
                      <div className="flex items-center gap-1.5">
                        <span className="text-[10px] uppercase tracking-widest text-slate-500 font-semibold">Status</span>
                        <select className="field" style={{ width:'auto', minWidth:'140px' }} value={r.status || 'New'}
                          onChange={e => onUpdate(r.id, { status: e.target.value })}>
                          {AMBASSADOR_STATUSES.map(s => <option key={s.key} value={s.key}>{s.key}</option>)}
                        </select>
                      </div>
                      <button onClick={() => onUpdate(r.id, { priority: !r.priority })}
                        className={`btn ${r.priority ? 'btn-danger' : 'btn-ghost'}`}>
                        <Icon name="flame" size={12} strokeWidth={2.1}/>{r.priority ? 'Priority' : 'Mark priority'}
                      </button>
                      <div className="ml-auto"><ScorePill score={r.applicant_score}/></div>
                    </div>

                    {(r.followup_count > 0) && (
                      <div className="rounded-lg px-3 py-2 text-[11.5px] flex items-center gap-2" style={{ background:'rgba(129,140,248,.10)', border:'1px solid rgba(129,140,248,.25)', color:'#c7d2fe' }}>
                        <Icon name="refresh" size={12}/>

                        ['Availability', [r.hours_per_day && `${r.hours_per_day} hrs/day`, r.days_per_week && `${r.days_per_week} days/wk`].filter(Boolean).join(' · ') || '—', 'clock'],
                        ['Can start', r.start_date, 'calendar'],
                        ['English', r.english_level, 'spark'],
                      ].map(([label, val, icon]) => (
                        <div key={label} className="glass-flat rounded-lg p-2.5">
                          <div className="text-[9.5px] uppercase tracking-widest text-slate-500 font-semibold flex items-center gap-1.5 mb-1"><Icon name={icon} size={10}/>{label}</div>
                          <div className="text-[12px] text-slate-200 break-words">{val || '—'}</div>
                        </div>
                      ))}
                    </div>

                    {/* Experience flags */}
                    <div className="flex flex-wrap gap-1.5">
                      {[
                        ['U.S. calling', r.us_calling_experience],
                        ['Voicemails', r.voicemail_experience],
                        ['Computer', r.has_computer],
                        ['Internet', r.has_internet],
                        ['Commission OK', r.commission_comfort],
                      ].map(([label, v]) => (
                        <span key={label} className={`pill ${v===true?'badge-ok':v===false?'badge-fail':'badge-muted'}`}>{label}: {yesNo(v)}</span>
                      ))}
                    </div>

                    {r.motivation && (
                      <div>
                        <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500 mb-1.5">Motivation</div>
                        <p className="text-[12.5px] text-slate-200 leading-relaxed">{r.motivation}</p>
                      </div>
                    )}

                    {r.call_summary && (
                      <div>
                        <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500 mb-1.5 flex items-center gap-1.5"><Icon name="spark" size={10} strokeWidth={2.2}/> AI Call Summary</div>
                        <p className="text-[12.5px] text-slate-200 leading-relaxed">{r.call_summary}</p>
                      </div>
                    )}

                    {r.call_transcript && (
                      <div>
                        <div className="text-[9.5px] font-semibold uppercase tracking-widest text-slate-500 mb-1.5 flex items-center gap-1.5"><Icon name="mic" size={10} strokeWidth={2.2}/> Transcript</div>
                        <div className="bg-black/30 border border-white/5 rounded-lg p-3 max-h-60 overflow-y-auto">
                          <pre className="text-[11.5px] text-slate-300 whitespace-pre-wrap font-mono leading-relaxed">{r.call_transcript}</pre>
                        </div>
                      </div>
                    )}

                    <div className="flex items-center justify-between flex-wrap gap-2 text-[10.5px] text-slate-600 pt-1">
                      <span className="font-mono">{r.source_phone_number ? `Called ${fmtPhone(r.source_phone_number)}` : ''}</span>
                      {r.call_recording_url && (
                        <a href={r.call_recording_url} target="_blank" rel="noreferrer" className="btn btn-ghost"><Icon name="play" size={11}/>Open recording</a>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─────── App ─────── */
function App() {
  const [session, setSession]       = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [tab, setTab]               = useState('overview');
  const [filter, setFilter]         = useState('all');
  const [search, setSearch]         = useState('');
  const [loading, setLoading]       = useState(true);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [spinning, setSpinning]     = useState(false);
  const [contacts, setContacts]     = useState([]);
  const [calls, setCalls]           = useState([]);
  const [sms, setSms]               = useState([]);
  const [ambassadors, setAmbassadors] = useState([]);
  const [ambFilter, setAmbFilter]   = useState('all');
  const [err, setErr]               = useState(null);
  const [drawerLead, setDrawerLead] = useState(null);
  const [mobileNav, setMobileNav]   = useState(false);

  useEffect(() => {
    if (!db || !isConfigured()) { setAuthLoading(false); return; }
    db.auth.getSession().then(({ data }) => { setSession(data.session||null); setAuthLoading(false); });
    const { data: sub } = db.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub?.subscription?.unsubscribe?.();
  }, []);

  const load = useCallback(async () => {
    if (!db || !isConfigured() || !session) { setLoading(false); return; }
    setSpinning(true);
    try {
      const smsQuery = await db.from('sms_messages').select('*').order('created_at',{ascending:false}).limit(300);
      const smsResult = smsQuery.error
        ? await db.from('admin_lead_alerts').select('*').order('created_at',{ascending:false}).limit(300)
        : smsQuery;
      const [{ data:c, error:e1 }, { data:cl, error:e2 }, { data:amb, error:e3 }] = await Promise.all([
        db.from('contacts').select('*').order('created_at',{ascending:false}).limit(500),
        db.from('calls').select('*').order('created_at',{ascending:false}).limit(300),
        db.from('ambassador_applicants').select('*').order('created_at',{ascending:false}).limit(500),
      ]);
      const firstErr = e1||e2||smsResult.error;
      if (firstErr) setErr(firstErr.message);
      else {
        setContacts(c||[]); setCalls(cl||[]); setSms(smsResult.data||[]);
        setAmbassadors(amb||[]);   // e3 (ambassador table) is non-fatal — table may not exist yet
        setLastRefresh(new Date()); setErr(null);
      }
    } catch(e) { setErr(e.message); }
    setLoading(false); setSpinning(false);
  }, [session]);

  useEffect(() => {
    if (!session) return;
    load();
    const t = setInterval(load, 30000);
    return () => clearInterval(t);
  }, [session, load]);

  const updateContact = async (id, fields) => {
    const { error } = await db.from('contacts').update({ ...fields, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { alert('Update failed: ' + error.message); return; }
    setContacts(prev => prev.map(c => c.id === id ? { ...c, ...fields } : c));
  };

  const updateAmbassador = async (id, fields) => {
    const { error } = await db.from('ambassador_applicants').update({ ...fields, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { alert('Update failed: ' + error.message); return; }
    setAmbassadors(prev => prev.map(a => a.id === id ? { ...a, ...fields } : a));
  };

  const signOut = async () => { await db.auth.signOut(); setSession(null); };

  if (!isConfigured()) return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="glass rounded-2xl p-7 max-w-md w-full space-y-4 text-center">
        <Illustration variant="default"/>
        <h2 className="text-base font-semibold text-slate-100">Configure Supabase</h2>
        <p className="text-[12.5px] text-slate-500">Update <code className="font-mono text-slate-300">SUPABASE_URL</code> and <code className="font-mono text-slate-300">SUPABASE_ANON_KEY</code> at the top of this file.</p>
      </div>
    </div>
  );

  if (authLoading) return <Spinner/>;
  if (!session) return <LoginScreen onLogin={() => db.auth.getSession().then(({ data }) => setSession(data.session))}/>;

  /* Filtering */
  const q = search.toLowerCase();
  const matchesSearch = r =>
    !q
    || (r.phone||'').includes(q)
    || (r.name||'').toLowerCase().includes(q)
    || (r.industry||'').toLowerCase().includes(q)
    || (r.email||'').toLowerCase().includes(q);

  const leadsFiltered = contacts.filter(r => {
    if (!matchesSearch(r)) return false;
    if (filter === 'all') return true;
    if (filter === 'newToday') return isToday(r.created_at);
    if (filter === 'followup') return ['new','contacted'].includes(r.lead_status||'new');
    return getLeadType(r) === filter;
  });

  const callsFiltered = calls.filter(r =>
    !q || (r.caller_phone||'').includes(q) || (r.summary||'').toLowerCase().includes(q));
  const smsFiltered = sms.filter(r =>
    !q || (r.to_number||'').includes(q) || (r.message||r.body||'').toLowerCase().includes(q));
  const ambassadorsFiltered = ambassadors.filter(r =>
    !q
    || (r.full_name||'').toLowerCase().includes(q)
    || (r.email||'').toLowerCase().includes(q)
    || (r.city||'').toLowerCase().includes(q)
    || (r.country||'').toLowerCase().includes(q)
    || (r.whatsapp||'').includes(q));

  const counts = {
    overview:   undefined,
    pipeline:   contacts.length,
    leads:      contacts.length,
    calls:      calls.length,
    sms:        sms.length,
    ambassador: ambassadors.length,
  };

  const TAB_META = {
    overview: { title:'Command Center', subtitle:'Pipeline · Priority Queue · Live activity — your sales cockpit.' },
    pipeline: { title:'Pipeline',       subtitle:'Track every lead through new, contacted, demo and closed.' },
    leads:    { title:'Leads',          subtitle:'Every contact and inbound lead, filterable and editable.' },
    calls:    { title:'Calls',          subtitle:'AI summaries, transcripts and outcomes from every call.' },
    sms:      { title:'SMS',            subtitle:'Inbound replies and outbound message activity.' },
    ambassador:{ title:'Ambassadors',   subtitle:'Phone applicants — scored, with call recordings. Move them through the pipeline.' },
  };

  const meta = TAB_META[tab] || TAB_META.overview;
  const onTabChange = (k) => { setTab(k); setMobileNav(false); if (k !== 'leads') setFilter('all'); setSearch(''); };

  return (
    <div className="min-h-screen flex">
      {/* Desktop sidebar */}
      <div className="hidden lg:flex w-[238px] flex-shrink-0 border-r border-white/5" style={{ background:'rgba(8,10,18,0.65)', backdropFilter:'blur(14px)' }}>
        <Sidebar tab={tab} setTab={onTabChange} counts={counts} user={session?.user} onSignOut={signOut}/>
      </div>

      {/* Mobile sidebar */}
      {mobileNav && (
        <Fragment>
          <div className="mobile-nav-backdrop" onClick={() => setMobileNav(false)}/>
          <div className="mobile-nav-panel lg:hidden">
            <Sidebar tab={tab} setTab={onTabChange} counts={counts} user={session?.user} onSignOut={signOut} onClose={() => setMobileNav(false)}/>
          </div>
        </Fragment>
      )}

      {/* Main */}
      <main className="flex-1 min-w-0">
        <div className="max-w-[1480px] mx-auto px-4 sm:px-5 lg:px-7 py-5">
          <TopBar
            title={meta.title}
            subtitle={meta.subtitle}
            lastRefresh={lastRefresh}
            onRefresh={load}
            spinning={spinning}
            onMenu={() => setMobileNav(true)}
            contacts={contacts}
          />

          {err ? (
            <ErrorPanel error={err} onRetry={load}/>
          ) : (
            <Fragment>
              {tab === 'overview' && (
                <CommandCenter contacts={contacts} calls={calls} sms={sms} loading={loading} onOpenLead={setDrawerLead} onTab={onTabChange} onUpdate={updateContact}/>
              )}

              {tab === 'pipeline' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <PipelineTab contacts={contacts} loading={loading} onUpdate={updateContact} onOpenLead={setDrawerLead} search={search} setSearch={setSearch}/>
                </div>
              )}

              {tab === 'leads' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <LeadsTab rows={leadsFiltered} loading={loading} onOpenLead={setDrawerLead} search={search} setSearch={setSearch} filter={filter} setFilter={setFilter} contacts={contacts}/>
                  <div className="border-t border-white/5 px-4 py-2.5 flex flex-wrap items-center justify-between gap-2">
                    <span className="text-[10.5px] text-slate-500"><span className="font-mono text-slate-300">{leadsFiltered.length}</span> of <span className="font-mono text-slate-300">{contacts.length}</span> contacts</span>
                    <span className="text-[10px] text-slate-600 flex items-center gap-1.5"><Icon name="refresh" size={10}/> Auto-refresh · 30s</span>
                  </div>
                </div>
              )}

              {tab === 'calls' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <CallsTab rows={callsFiltered} loading={loading} search={search} setSearch={setSearch}/>
                </div>
              )}

              {tab === 'sms' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <SMSTab rows={smsFiltered} loading={loading} search={search} setSearch={setSearch}/>
                </div>
              )}

              {tab === 'ambassador' && (
                <div className="glass rounded-2xl overflow-hidden">
                  <AmbassadorsTab rows={ambassadorsFiltered} loading={loading} search={search} setSearch={setSearch}
                    filter={ambFilter} setFilter={setAmbFilter} onUpdate={updateAmbassador}/>
                  <div className="border-t border-white/5 px-4 py-2.5 flex flex-wrap items-center justify-between gap-2">
                    <span className="text-[10.5px] text-slate-500"><span className="font-mono text-slate-300">{ambassadorsFiltered.length}</span> of <span className="font-mono text-slate-300">{ambassadors.length}</span> applicants</span>
                    <span className="text-[10px] text-slate-600 flex items-center gap-1.5"><Icon name="refresh" size={10}/> Auto-refresh · 30s</span>
                  </div>
                </div>
              )}

              <div className="mt-5 flex flex-wrap items-center justify-between gap-2 px-1 text-[10.5px] text-slate-600">
                <div className="flex items-center gap-3">
                  <span className="flex items-center gap-1.5">
                    <span className="dot bg-emerald-400 pulse-dot"/>
                    Synced from Supabase
                  </span>
                  <span className="hidden sm:inline">·</span>
                  <span className="hidden sm:inline">{lastRefresh ? `Last sync ${fmtAgo(lastRefresh)}` : 'Awaiting sync'}</span>
                </div>
                <span>© Topher AI · Lead Command Center</span>
              </div>
            </Fragment>
          )}
        </div>
      </main>

      {drawerLead && <LeadDrawer lead={drawerLead} onClose={() => setDrawerLead(null)} onUpdate={updateContact}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
